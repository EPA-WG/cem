name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CEM_ML_SCHEMA_ORACLE_REQUIRED: '1'
  TRANG_NATIVE_REQUIRE_PREBUILT: '1'

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> dist/target"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libxml2-utils

      - name: Resolve native Trang
        run: yarn nx run @epa-wg/trang-native:build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Validate UTF-8 encoding
        run: yarn validate:utf8

      - name: Derive Nx SHAs
        uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: main

      - name: Run affected targets
        run: yarn nx affected -t lint test build typecheck e2e-ci
