name: Publish

on:
  push:
    tags:
      - '*.*.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TRANG_NATIVE_REQUIRE_PREBUILT: '1'

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # for npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: yarn

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> dist/target"

      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.122

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Resolve native Trang
        run: yarn nx run @epa-wg/trang-native:build

      - name: Build packages
        run: yarn nx run-many -t build

      - name: Publish packages
        run: yarn nx release publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
