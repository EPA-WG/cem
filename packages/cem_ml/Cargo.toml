[package]
name = "cem-ml"
version = "0.1.0"
edition = "2021"
description = "CEM schema-defined parser/runtime library"
license = "MIT"
publish = true

[lib]
name = "cem_ml"
crate-type = ["cdylib", "rlib"]

[features]
fake-engine = []

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
blake3 = "1"

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"

[dev-dependencies]
tree-sitter = "0.25"
tree-sitter-cem = { path = "grammar/tree-sitter-cem" }
