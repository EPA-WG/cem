<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CEM layering CSS generator</title>
    <style>
        main { display: block; white-space: pre; font-family: monospace; }
        table { white-space: normal; border-collapse: collapse; }
        td { padding: 0.5rem; letter-spacing: 0.05em; }
        caption { font-size: 1.5rem; padding-bottom: 0.5rem; text-align: start; }
        tr>th:first-child { text-align: start; }
        code { color: green; font-weight: bold; }
    </style>
</head>
<body>
<!--
  Phase 3.6 CEM-ML/CEM-QL generator (Option B). cem-css-generator.js shapes the token tables into
  datadom.slices via the cem-elements DOM→datadom bridge and renders this template through the
  cem_ql WASM boundary; no live browser XSLT. Columns — rungs: td1=token td2=value td3=desc td4=tier;
  semantic/optional: td1=token td2=value td3=desc td4=tier; forced: td1=token td2=value.
-->
<template type="cem-ml; version=0.0"
          id="cem-layering-template"
          data-token-url="../../../dist/lib/tokens/cem-layering.xhtml"
          data-slices="rungs=cem-layering-rungs semantic=cem-layering-semantic optional=cem-layering-semantic-optional forced=cem-layering-rungs-forced">
{table |
    {caption | {a @href="../../../dist/lib/tokens/cem-layering.xhtml#7-1-required-rung-tokens" | cem-layering-rungs} — signed-depth ladder (box-shadow recipes)}
    {thead | {tr | {th | Token}{th | Value}{th | Tier}{th | Sample}{th | Description}}}
    {tbody | {cem:for-each @select="$datadom.slices.rungs" @as="row" |
        {tr |
            {th | {code | {$row.td1}}}
            {td | {code | {$row.td2}}}
            {td | {$row.td4}}
            {td @style="width:6rem;" | {div @style="height:2rem; width:5rem; background: Canvas; box-shadow: var({$row.td1}); border-radius: 0.25rem;" @title="{$row.td1}" | }}
            {td | {$row.td3}}
        }}}
}
{hr | }
{table |
    {caption | {a @href="../../../dist/lib/tokens/cem-layering.xhtml#8-1-canonical-endpoints" | cem-layering-semantic} — required semantic endpoints}
    {thead | {tr | {th | Token}{th | Value}{th | Tier}{th | Description}}}
    {tbody | {cem:for-each @select="$datadom.slices.semantic" @as="row" |
        {tr | {th | {code | {$row.td1}}}{td | {code | {$row.td2}}}{td | {$row.td4}}{td | {$row.td3}}}}{cem:for-each @select="$datadom.slices.optional" @as="row" |
        {tr | {th | {code | {$row.td1}}}{td | {code | {$row.td2}}}{td | {$row.td4}}{td | {$row.td3}}}}}
}
{hr | }
{table |
    {caption | {a @href="../../../dist/lib/tokens/cem-layering.xhtml#13-2-forced-colors" | cem-layering-rungs-forced} — forced-colors fallback}
    {thead | {tr | {th | Token}{th | Forced-colors value}}}
    {tbody | {cem:for-each @select="$datadom.slices.forced" @as="row" |
        {tr | {th | {code | {$row.td1}}}{td | {code | {$row.td2}}}}}}
}
{hr | }
{pre @class=language-css | {code @class=language-css @data-generated-css |```:root {
  /* region basis rungs — signed depth ladder as box-shadow recipes (NOT z-index) */```{cem:for-each @select="$datadom.slices.rungs" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion basis rungs */

  /* region semantic endpoints — required product-facing contract */```{cem:for-each @select="$datadom.slices.semantic" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion semantic endpoints */

  /* region optional semantic endpoints — back-deep / work-floating */```{cem:for-each @select="$datadom.slices.optional" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion optional semantic endpoints */
}

/* region forced-colors fallback — collapse rungs; tier signal carried by D5 contour and spatial isolation */
@media (forced-colors: active) {
  :root {```{cem:for-each @select="$datadom.slices.forced" @as="row" |```
    ```{$row.td1}: {$row.td2};}```
  }
}
/* endregion forced-colors fallback */
```}}
</template>
<main></main>
<cem-css-loader></cem-css-loader>
<script src="./cem-css-loader.js" type="module"></script>
<script src="./cem-css-generator.js" type="module"></script>
</body>
</html>
