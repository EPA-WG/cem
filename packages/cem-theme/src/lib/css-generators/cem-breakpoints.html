<!DOCTYPE html>
<html lang="en" xmlns:xhtml="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>CEM breakpoints CSS generator</title>
    <script src="./cem-http-request.js" type="module"></script>
</head>
<body>
<custom-element>
    <template id="cem-breakpoints-template">
        <style>
            td { padding: 0.5rem; letter-spacing: 0.05em; }
            caption { font-size: 1.5rem; padding-bottom: 0.5rem; text-align: start; }
            tr>th:first-child { text-align: start; }
            code { color: green; font-weight: bold; }
        </style>

        <http-request method="GET" slice="cem-breakpoints" url="../../../dist/lib/tokens/cem-breakpoints.xhtml"></http-request>
        <variable name="bpData" select="//cem-breakpoints"></variable>

        <variable name="cem-bp-basis"
                  select="$bpData//*[@id='cem-bp-basis']/following-sibling::xhtml:table[1]/xhtml:tbody"></variable>
        <variable name="cem-bp-height"
                  select="$bpData//*[@id='cem-bp-height']/following-sibling::xhtml:table[1]/xhtml:tbody"></variable>
        <variable name="cem-bp-active"
                  select="$bpData//*[@id='cem-bp-active']/following-sibling::xhtml:table[1]/xhtml:tbody"></variable>
        <variable name="cem-bp-cq"
                  select="$bpData//*[@id='cem-bp-cq']/following-sibling::xhtml:table[1]/xhtml:tbody"></variable>
        <variable name="cem-bp-media-ranges"
                  select="$bpData//*[@id='cem-bp-media-ranges']/following-sibling::xhtml:table[1]/xhtml:tbody"></variable>
        <variable name="cem-bp-height-ranges"
                  select="$bpData//*[@id='cem-bp-height-ranges']/following-sibling::xhtml:table[1]/xhtml:tbody"></variable>

        <variable name="css-body">
/* ── Block A — CSS custom property reference values ─────────────────────── */

:root {
    /* region width basis: epsilon + cem-bp-width-[range]-[min|max] */
    <for-each select="$cem-bp-basis/xhtml:tr">
        {normalize-space(xhtml:td[1])}: {normalize-space(xhtml:td[2])};
    </for-each>
    /* endregion width basis */

    /* region height basis: cem-bp-height-[range]-[min|max] */
    <for-each select="$cem-bp-height/xhtml:tr">
        {normalize-space(xhtml:td[1])}: {normalize-space(xhtml:td[2])};
    </for-each>
    /* endregion height basis */

    /* region container query reference values: cem-cq-width-[range]-[min|max] */
    /* Consumer must provide container-type: inline-size (see R-D1x-WRAP) */
    <for-each select="$cem-bp-cq/xhtml:tr">
        {normalize-space(xhtml:td[1])}: {normalize-space(xhtml:td[2])};
    </for-each>
    /* endregion container query reference values */
}

/* ── Block B — @media active-width helpers ───────────────────────────────── */
/* Sets --cem-bp-active-width; read via JS: getComputedStyle(root).getPropertyValue('--cem-bp-active-width').trim() */

<for-each select="$cem-bp-media-ranges/xhtml:tr">
    <variable name="range" select="normalize-space(xhtml:td[1])"></variable>
    <variable name="min-w" select="normalize-space(xhtml:td[2])"></variable>
    <variable name="max-w" select="normalize-space(xhtml:td[3])"></variable>
    <choose>
        <when test="$min-w = '0px'">
@media (max-width: {$max-w}) {
:root {
    <text>--cem-bp-active-width: </text>{$range}<text>;</text>
}
}
        </when>
        <when test="$max-w = '—'">
@media (min-width: {$min-w}) {
:root {
    <text>--cem-bp-active-width: </text>{$range}<text>;</text>
}
}
        </when>
        <otherwise>
@media (min-width: {$min-w}) and (max-width: {$max-w}) {
:root {
    <text>--cem-bp-active-width: </text>{$range}<text>;</text>
}
}
        </otherwise>
    </choose>
</for-each>

/* Height helpers (informative — most apps adapt on width only) */
<for-each select="$cem-bp-height-ranges/xhtml:tr">
    <variable name="range"  select="normalize-space(xhtml:td[1])"></variable>
    <variable name="min-h"  select="normalize-space(xhtml:td[2])"></variable>
    <variable name="max-h"  select="normalize-space(xhtml:td[3])"></variable>
    <choose>
        <when test="$min-h = '0px'">
@media (max-height: {$max-h}) {
:root {
    <text>--cem-bp-active-height: </text>{$range}<text>;</text>
}
}
        </when>
        <when test="$max-h = '—'">
@media (min-height: {$min-h}) {
:root {
    <text>--cem-bp-active-height: </text>{$range}<text>;</text>
}
}
        </when>
        <otherwise>
@media (min-height: {$min-h}) and (max-height: {$max-h}) {
:root {
    <text>--cem-bp-active-height: </text>{$range}<text>;</text>
}
}
        </otherwise>
    </choose>
</for-each>

/* ── Block C — @container helpers ────────────────────────────────────────── */
/* Deferred: CEM does not emit @container selectors (R-D1x-WRAP).             */
/* Use --cem-cq-width-* reference values in your own @container rules.        */
        </variable>

        <style>
            :host {
                display: block;
                white-space: pre;
                font-family: monospace;
            }
        </style>

        <xhtml:table>
            <xhtml:caption><a href="../../../dist/lib/tokens/cem-breakpoints.xhtml#5-1-basis-tokens-bounds">cem-bp-basis</a> — width + epsilon basis tokens</xhtml:caption>
            <xhtml:thead>
                <xhtml:tr>
                    <xhtml:th>Token</xhtml:th>
                    <xhtml:th>Value</xhtml:th>
                    <xhtml:th>Tier</xhtml:th>
                    <xhtml:th>Description</xhtml:th>
                </xhtml:tr>
            </xhtml:thead>
            <xhtml:tbody>
                <for-each select="$cem-bp-basis/xhtml:tr">
                    <variable name="token" select="normalize-space(xhtml:td[1])"></variable>
                    <variable name="value" select="normalize-space(xhtml:td[2])"></variable>
                    <variable name="desc"  select="normalize-space(xhtml:td[3])"></variable>
                    <variable name="tier"  select="normalize-space(xhtml:td[4])"></variable>
                    <xhtml:tr>
                        <xhtml:th><code>{$token}</code></xhtml:th>
                        <xhtml:td><code>{$value}</code></xhtml:td>
                        <xhtml:td>{$tier}</xhtml:td>
                        <xhtml:td>{$desc}</xhtml:td>
                    </xhtml:tr>
                </for-each>
            </xhtml:tbody>
        </xhtml:table>

        <hr/>
        <xhtml:table>
            <xhtml:caption><a href="../../../dist/lib/tokens/cem-breakpoints.xhtml#cem-bp-height">cem-bp-height</a> — height basis tokens</xhtml:caption>
            <xhtml:thead>
                <xhtml:tr>
                    <xhtml:th>Token</xhtml:th>
                    <xhtml:th>Value</xhtml:th>
                    <xhtml:th>Tier</xhtml:th>
                    <xhtml:th>Description</xhtml:th>
                </xhtml:tr>
            </xhtml:thead>
            <xhtml:tbody>
                <for-each select="$cem-bp-height/xhtml:tr">
                    <variable name="token" select="normalize-space(xhtml:td[1])"></variable>
                    <variable name="value" select="normalize-space(xhtml:td[2])"></variable>
                    <variable name="desc"  select="normalize-space(xhtml:td[3])"></variable>
                    <variable name="tier"  select="normalize-space(xhtml:td[4])"></variable>
                    <xhtml:tr>
                        <xhtml:th><code>{$token}</code></xhtml:th>
                        <xhtml:td><code>{$value}</code></xhtml:td>
                        <xhtml:td>{$tier}</xhtml:td>
                        <xhtml:td>{$desc}</xhtml:td>
                    </xhtml:tr>
                </for-each>
            </xhtml:tbody>
        </xhtml:table>

        <hr/>
        <xhtml:table>
            <xhtml:caption><a href="../../../dist/lib/tokens/cem-breakpoints.xhtml#8-1-container-bounds-optional">cem-bp-cq</a> — container query reference values</xhtml:caption>
            <xhtml:thead>
                <xhtml:tr>
                    <xhtml:th>Token</xhtml:th>
                    <xhtml:th>Value</xhtml:th>
                    <xhtml:th>Tier</xhtml:th>
                    <xhtml:th>Description</xhtml:th>
                </xhtml:tr>
            </xhtml:thead>
            <xhtml:tbody>
                <for-each select="$cem-bp-cq/xhtml:tr">
                    <variable name="token" select="normalize-space(xhtml:td[1])"></variable>
                    <variable name="value" select="normalize-space(xhtml:td[2])"></variable>
                    <variable name="desc"  select="normalize-space(xhtml:td[3])"></variable>
                    <variable name="tier"  select="normalize-space(xhtml:td[4])"></variable>
                    <xhtml:tr>
                        <xhtml:th><code>{$token}</code></xhtml:th>
                        <xhtml:td><code>{$value}</code></xhtml:td>
                        <xhtml:td>{$tier}</xhtml:td>
                        <xhtml:td>{$desc}</xhtml:td>
                    </xhtml:tr>
                </for-each>
            </xhtml:tbody>
        </xhtml:table>

        <hr/>
        <pre class="language-css">
            <code class="language-css" data-generated-css>
{$css-body}
            </code>
        </pre>
        <cem-css-loader value="{$css-body}"></cem-css-loader>

    </template>
</custom-element>
<main></main>
<script src="../../../../../node_modules/@epa-wg/custom-element/custom-element.js" type="module"></script>
<script src="../../../../../node_modules/@epa-wg/custom-element/http-request.js" type="module"></script>
<script src="./cem-css-loader.js" type="module"></script>
</body>
</html>
