<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CEM shape CSS generator</title>
    <!-- Cosmetic preview dependencies: D1 dimension scale + D2c control geometry that this
         spec's bend tokens reference (e.g. --cem-bend-smooth: var(--cem-dim-x-small)). Linking the
         already-generated CSS replaces the legacy in-page re-derivation of those vars; it does not
         affect this generator's own captured output. -->
    <link rel="stylesheet" href="../css/cem-dimension.css">
    <link rel="stylesheet" href="../css/cem-controls.css">
    <style>
        main { display: block; white-space: pre; font-family: monospace; }
        table { white-space: normal; border-collapse: collapse; }
        td { padding: 0.5rem; letter-spacing: 0.05em; }
        caption { font-size: 1.5rem; padding-bottom: 0.5rem; text-align: start; }
        tr>th:first-child { text-align: start; }
        code { color: green; font-weight: bold; }
    </style>
</head>
<body>
<!--
  Phase 3.6 CEM-ML/CEM-QL generator (Option B). cem-css-generator.js shapes the token tables into
  datadom.slices via the cem-elements DOM→datadom bridge and renders this template through the
  cem_ql WASM boundary; no live browser XSLT. Columns — basis/semantic/pattern: td1=token td2=value
  td3=desc td4=tier; mode-sharp/mode-round: td1=token td2=value. (The legacy cosmetic
  preview-dependency injection of D1/D2c vars is dropped — it did not affect generated output.)
-->
<template type="cem-ml; version=0.0"
          id="cem-shape-template"
          data-token-url="../../../dist/lib/tokens/cem-shape.xhtml"
          data-slices="basis=cem-shape-basis semantic=cem-shape-semantic pattern=cem-shape-pattern action=cem-shape-action-bindings sharp=cem-shape-mode-sharp round=cem-shape-mode-round">
{table |
    {caption | {a @href="../../../dist/lib/tokens/cem-shape.xhtml#4-minimal-bend-basis-complexity-compliant" | cem-shape-basis} — bend basis tokens}
    {thead | {tr | {th | Token}{th | Value}{th | Tier}{th | Sample}{th | Description}}}
    {tbody | {cem:for-each @select="$datadom.slices.basis" @as="row" |
        {tr |
            {th | {code | {$row.td1}}}
            {td | {code | {$row.td2}}}
            {td | {$row.td4}}
            {td @style="width:5rem;" | {div @style="height:2rem; width:3rem; background: currentColor; border-radius: var({$row.td1});" @title="{$row.td1}" | }}
            {td | {$row.td3}}
        }}}
}
{hr | }
{table |
    {caption | {a @href="../../../dist/lib/tokens/cem-shape.xhtml#5-semantic-endpoints-product-facing-contract" | cem-shape-semantic} — role-first semantic endpoints}
    {thead | {tr | {th | Token}{th | Value}{th | Tier}{th | Sample}{th | Description}}}
    {tbody | {cem:for-each @select="$datadom.slices.semantic" @as="row" |
        {tr |
            {th | {code | {$row.td1}}}
            {td | {code | {$row.td2}}}
            {td | {$row.td4}}
            {td @style="width:5rem;" | {div @style="height:2rem; width:3rem; background: currentColor; border-radius: var({$row.td1});" @title="{$row.td1}" | }}
            {td | {$row.td3}}
        }}}
}
{hr | }
{table |
    {caption | {a @href="../../../dist/lib/tokens/cem-shape.xhtml#7-1-attachment-pattern-one-pattern-not-many-tokens" | cem-shape-pattern} — asymmetric attachment patterns}
    {thead | {tr | {th | Token}{th | Value}{th | Tier}{th | Description}}}
    {tbody | {cem:for-each @select="$datadom.slices.pattern" @as="row" |
        {tr | {th | {code | {$row.td1}}}{td | {code | {$row.td2}}}{td | {$row.td4}}{td | {$row.td3}}}}}
}
{hr | }
{table |
    {caption | {a @href="../../../dist/lib/tokens/cem-shape.xhtml#6-2-mode-implementation-recommended" | cem-shape-mode-sharp} — data-cem-shape="sharp" overrides}
    {thead | {tr | {th | Token}{th | Override value}}}
    {tbody | {cem:for-each @select="$datadom.slices.sharp" @as="row" |
        {tr | {th | {code | {$row.td1}}}{td | {code | {$row.td2}}}}}}
}
{hr | }
{table |
    {caption | {a @href="../../../dist/lib/tokens/cem-shape.xhtml#6-2-mode-implementation-recommended" | cem-shape-mode-round} — data-cem-shape="round" overrides}
    {thead | {tr | {th | Token}{th | Override value}}}
    {tbody | {cem:for-each @select="$datadom.slices.round" @as="row" |
        {tr | {th | {code | {$row.td1}}}{td | {code | {$row.td2}}}}}}
}
{hr | }
{pre @class=language-css | {code @class=language-css @data-generated-css |```:root {
  /* region bend basis — sharp / smooth / round / circle plus active alias */```{cem:for-each @select="$datadom.slices.basis" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion bend basis */

  /* region semantic endpoints — role-first product contract */```{cem:for-each @select="$datadom.slices.semantic" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion semantic endpoints */

  /* region pattern tokens — asymmetric attachment */```{cem:for-each @select="$datadom.slices.pattern" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion pattern tokens */

  /* region action component bindings — geometry owned by D3 */```{cem:for-each @select="$datadom.slices.action" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion action component bindings */
}

/* region shape mode: sharp — technical, precise brand expression */
:root[data-cem-shape="sharp"] {```{cem:for-each @select="$datadom.slices.sharp" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
}
/* endregion shape mode: sharp */

/* region shape mode: round — consumer, welcoming brand expression */
:root[data-cem-shape="round"] {```{cem:for-each @select="$datadom.slices.round" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
}
/* endregion shape mode: round */
```}}
</template>
<main></main>
<cem-css-loader></cem-css-loader>
<script src="./cem-css-loader.js" type="module"></script>
<script src="./cem-css-generator.js" type="module"></script>
</body>
</html>
