<!DOCTYPE html>
<html lang="en" xmlns:xhtml="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>CEM shape CSS generator</title>
    <script src="./cem-http-request.js" type="module"></script>
</head>
<body>
<custom-element>
    <template id="cem-shape-template">
        <style>
            td { padding: 0.5rem; letter-spacing: 0.05em; }
            caption { font-size: 1.5rem; padding-bottom: 0.5rem; text-align: start; }
            tr>th:first-child { text-align: start; }
            code { color: green; font-weight: bold; }
        </style>

        <http-request method="GET" slice="cem-dimension" url="../../../dist/lib/tokens/cem-dimension.xhtml"></http-request>
        <http-request method="GET" slice="cem-controls" url="../../../dist/lib/tokens/cem-controls.xhtml"></http-request>
        <http-request method="GET" slice="cem-shape" url="../../../dist/lib/tokens/cem-shape.xhtml"></http-request>
        <variable name="dimData" select="//cem-dimension"></variable>
        <variable name="controlsData" select="//cem-controls"></variable>
        <variable name="shapeData" select="//cem-shape"></variable>

        <variable name="cem-dim-scale"
                  select="$dimData//*[@id='cem-dim-scale']/following-sibling::xhtml:table[1]/xhtml:tbody"></variable>
        <variable name="cem-controls-geometry"
                  select="$controlsData//*[@id='cem-controls-geometry']/following-sibling::xhtml:table[1]/xhtml:tbody"></variable>
        <variable name="cem-shape-basis"
                  select="$shapeData//*[@id='cem-shape-basis']/following-sibling::xhtml:table[1]/xhtml:tbody"></variable>
        <variable name="cem-shape-semantic"
                  select="$shapeData//*[@id='cem-shape-semantic']/following-sibling::xhtml:table[1]/xhtml:tbody"></variable>
        <variable name="cem-shape-pattern"
                  select="$shapeData//*[@id='cem-shape-pattern']/following-sibling::xhtml:table[1]/xhtml:tbody"></variable>
        <variable name="cem-shape-action-bindings"
                  select="$shapeData//*[@id='cem-shape-action-bindings']/following-sibling::xhtml:table[1]/xhtml:tbody"></variable>
        <variable name="cem-shape-mode-sharp"
                  select="$shapeData//*[@id='cem-shape-mode-sharp']/following-sibling::xhtml:table[1]/xhtml:tbody"></variable>
        <variable name="cem-shape-mode-round"
                  select="$shapeData//*[@id='cem-shape-mode-round']/following-sibling::xhtml:table[1]/xhtml:tbody"></variable>

        <variable name="preview-dependency-css">
:root {
    /* region preview dependencies — D1 dimension scale */
    <for-each select="$cem-dim-scale/xhtml:tr">
        {normalize-space(xhtml:td[1])}: {normalize-space(xhtml:td[2])};
    </for-each>
    /* endregion preview dependencies */

    /* region preview dependencies — D2c control geometry */
    <for-each select="$cem-controls-geometry/xhtml:tr">
        {normalize-space(xhtml:td[1])}: {normalize-space(xhtml:td[2])};
    </for-each>
    /* endregion preview dependencies */
}
        </variable>

        <variable name="css-body">
:root {
    /* region bend basis — sharp / smooth / round / circle plus active alias */
    <for-each select="$cem-shape-basis/xhtml:tr">
        {normalize-space(xhtml:td[1])}: {normalize-space(xhtml:td[2])};
    </for-each>
    /* endregion bend basis */

    /* region semantic endpoints — role-first product contract */
    <for-each select="$cem-shape-semantic/xhtml:tr">
        {normalize-space(xhtml:td[1])}: {normalize-space(xhtml:td[2])};
    </for-each>
    /* endregion semantic endpoints */

    /* region pattern tokens — asymmetric attachment */
    <for-each select="$cem-shape-pattern/xhtml:tr">
        {normalize-space(xhtml:td[1])}: {normalize-space(xhtml:td[2])};
    </for-each>
    /* endregion pattern tokens */

    /* region action component bindings — geometry owned by D3 */
    <for-each select="$cem-shape-action-bindings/xhtml:tr">
        {normalize-space(xhtml:td[1])}: {normalize-space(xhtml:td[2])};
    </for-each>
    /* endregion action component bindings */
}

/* region shape mode: sharp — technical, precise brand expression */
:root[data-cem-shape="sharp"] {
    <for-each select="$cem-shape-mode-sharp/xhtml:tr">
        {normalize-space(xhtml:td[1])}: {normalize-space(xhtml:td[2])};
    </for-each>
}
/* endregion shape mode: sharp */

/* region shape mode: round — consumer, welcoming brand expression */
:root[data-cem-shape="round"] {
    <for-each select="$cem-shape-mode-round/xhtml:tr">
        {normalize-space(xhtml:td[1])}: {normalize-space(xhtml:td[2])};
    </for-each>
}
/* endregion shape mode: round */
        </variable>

        <style>
            :host {
                display: block;
                white-space: pre;
                font-family: monospace;
            }
        </style>

        <xhtml:table>
            <xhtml:caption><a href="../../../dist/lib/tokens/cem-shape.xhtml#4-minimal-bend-basis-complexity-compliant">cem-shape-basis</a> — bend basis tokens</xhtml:caption>
            <xhtml:thead>
                <xhtml:tr>
                    <xhtml:th>Token</xhtml:th>
                    <xhtml:th>Value</xhtml:th>
                    <xhtml:th>Tier</xhtml:th>
                    <xhtml:th>Sample</xhtml:th>
                    <xhtml:th>Description</xhtml:th>
                </xhtml:tr>
            </xhtml:thead>
            <xhtml:tbody>
                <for-each select="$cem-shape-basis/xhtml:tr">
                    <variable name="token" select="normalize-space(xhtml:td[1])"></variable>
                    <variable name="value" select="normalize-space(xhtml:td[2])"></variable>
                    <variable name="desc"  select="normalize-space(xhtml:td[3])"></variable>
                    <variable name="tier"  select="normalize-space(xhtml:td[4])"></variable>
                    <xhtml:tr>
                        <xhtml:th><code>{$token}</code></xhtml:th>
                        <xhtml:td><code>{$value}</code></xhtml:td>
                        <xhtml:td>{$tier}</xhtml:td>
                        <xhtml:td style="width:5rem;">
                            <xhtml:div style="height:2rem; width:3rem; background: currentColor; border-radius: var({$token});" title="{$token}"></xhtml:div>
                        </xhtml:td>
                        <xhtml:td>{$desc}</xhtml:td>
                    </xhtml:tr>
                </for-each>
            </xhtml:tbody>
        </xhtml:table>

        <hr/>
        <xhtml:table>
            <xhtml:caption><a href="../../../dist/lib/tokens/cem-shape.xhtml#5-semantic-endpoints-product-facing-contract">cem-shape-semantic</a> — role-first semantic endpoints</xhtml:caption>
            <xhtml:thead>
                <xhtml:tr>
                    <xhtml:th>Token</xhtml:th>
                    <xhtml:th>Value</xhtml:th>
                    <xhtml:th>Tier</xhtml:th>
                    <xhtml:th>Sample</xhtml:th>
                    <xhtml:th>Description</xhtml:th>
                </xhtml:tr>
            </xhtml:thead>
            <xhtml:tbody>
                <for-each select="$cem-shape-semantic/xhtml:tr">
                    <variable name="token" select="normalize-space(xhtml:td[1])"></variable>
                    <variable name="value" select="normalize-space(xhtml:td[2])"></variable>
                    <variable name="desc"  select="normalize-space(xhtml:td[3])"></variable>
                    <variable name="tier"  select="normalize-space(xhtml:td[4])"></variable>
                    <xhtml:tr>
                        <xhtml:th><code>{$token}</code></xhtml:th>
                        <xhtml:td><code>{$value}</code></xhtml:td>
                        <xhtml:td>{$tier}</xhtml:td>
                        <xhtml:td style="width:5rem;">
                            <xhtml:div style="height:2rem; width:3rem; background: currentColor; border-radius: var({$token});" title="{$token}"></xhtml:div>
                        </xhtml:td>
                        <xhtml:td>{$desc}</xhtml:td>
                    </xhtml:tr>
                </for-each>
            </xhtml:tbody>
        </xhtml:table>

        <hr/>
        <xhtml:table>
            <xhtml:caption><a href="../../../dist/lib/tokens/cem-shape.xhtml#7-1-attachment-pattern-one-pattern-not-many-tokens">cem-shape-pattern</a> — asymmetric attachment patterns</xhtml:caption>
            <xhtml:thead>
                <xhtml:tr>
                    <xhtml:th>Token</xhtml:th>
                    <xhtml:th>Value</xhtml:th>
                    <xhtml:th>Tier</xhtml:th>
                    <xhtml:th>Description</xhtml:th>
                </xhtml:tr>
            </xhtml:thead>
            <xhtml:tbody>
                <for-each select="$cem-shape-pattern/xhtml:tr">
                    <variable name="token" select="normalize-space(xhtml:td[1])"></variable>
                    <variable name="value" select="normalize-space(xhtml:td[2])"></variable>
                    <variable name="desc"  select="normalize-space(xhtml:td[3])"></variable>
                    <variable name="tier"  select="normalize-space(xhtml:td[4])"></variable>
                    <xhtml:tr>
                        <xhtml:th><code>{$token}</code></xhtml:th>
                        <xhtml:td><code>{$value}</code></xhtml:td>
                        <xhtml:td>{$tier}</xhtml:td>
                        <xhtml:td>{$desc}</xhtml:td>
                    </xhtml:tr>
                </for-each>
            </xhtml:tbody>
        </xhtml:table>

        <hr/>
        <xhtml:table>
            <xhtml:caption><a href="../../../dist/lib/tokens/cem-shape.xhtml#6-2-mode-implementation-recommended">cem-shape-mode-sharp</a> — `data-cem-shape="sharp"` overrides</xhtml:caption>
            <xhtml:thead>
                <xhtml:tr>
                    <xhtml:th>Token</xhtml:th>
                    <xhtml:th>Override value</xhtml:th>
                </xhtml:tr>
            </xhtml:thead>
            <xhtml:tbody>
                <for-each select="$cem-shape-mode-sharp/xhtml:tr">
                    <variable name="token" select="normalize-space(xhtml:td[1])"></variable>
                    <variable name="value" select="normalize-space(xhtml:td[2])"></variable>
                    <xhtml:tr>
                        <xhtml:th><code>{$token}</code></xhtml:th>
                        <xhtml:td><code>{$value}</code></xhtml:td>
                    </xhtml:tr>
                </for-each>
            </xhtml:tbody>
        </xhtml:table>

        <hr/>
        <xhtml:table>
            <xhtml:caption><a href="../../../dist/lib/tokens/cem-shape.xhtml#6-2-mode-implementation-recommended">cem-shape-mode-round</a> — `data-cem-shape="round"` overrides</xhtml:caption>
            <xhtml:thead>
                <xhtml:tr>
                    <xhtml:th>Token</xhtml:th>
                    <xhtml:th>Override value</xhtml:th>
                </xhtml:tr>
            </xhtml:thead>
            <xhtml:tbody>
                <for-each select="$cem-shape-mode-round/xhtml:tr">
                    <variable name="token" select="normalize-space(xhtml:td[1])"></variable>
                    <variable name="value" select="normalize-space(xhtml:td[2])"></variable>
                    <xhtml:tr>
                        <xhtml:th><code>{$token}</code></xhtml:th>
                        <xhtml:td><code>{$value}</code></xhtml:td>
                    </xhtml:tr>
                </for-each>
            </xhtml:tbody>
        </xhtml:table>

        <hr/>
        <pre class="language-css">
            <code class="language-css" data-generated-css>
{$css-body}
            </code>
        </pre>
        <cem-css-loader value="{$preview-dependency-css}"></cem-css-loader>
        <cem-css-loader value="{$css-body}"></cem-css-loader>

    </template>
</custom-element>
<main></main>
<script src="../../../../../node_modules/@epa-wg/custom-element/custom-element.js" type="module"></script>
<script src="../../../../../node_modules/@epa-wg/custom-element/http-request.js" type="module"></script>
<script src="./cem-css-loader.js" type="module"></script>
</body>
</html>
