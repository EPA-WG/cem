<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CEM voice / fonts / typography CSS generator</title>
    <style>
        main { display: block; white-space: pre; font-family: monospace; }
        table { white-space: normal; border-collapse: collapse; }
        td { padding: 0.5rem; letter-spacing: 0.05em; }
        caption { font-size: 1.5rem; padding-bottom: 0.5rem; text-align: start; }
        tr>th:first-child { text-align: start; }
        code { color: green; font-weight: bold; }
        .type-sample { display: inline-block; font-family: var(--cem-fontography-ui-family, system-ui, sans-serif); }
    </style>
</head>
<body>
<!--
  Phase 3.6 CEM-ML/CEM-QL generator (Option B). cem-css-generator.js shapes the token tables into
  datadom.slices via the cem-elements DOM→datadom bridge and renders this template through the
  cem_ql WASM boundary; no live browser XSLT. All token tables are td1=token td2=value td3=desc
  td4=tier. The css-body is faithful; the preview tables are simplified (the legacy cosmetic
  per-sample conditional rendering is dropped — it did not affect generated output).
-->
<template type="cem-ml; version=0.0"
          id="cem-voice-template"
          data-token-url="../../../dist/lib/tokens/cem-voice-fonts-typography.xhtml"
          data-slices="font=cem-typography-fontography thick=cem-typography-thickness size=cem-typography-size lh=cem-typography-line-height ls=cem-typography-letter-spacing feat=cem-typography-feature readerg=cem-typography-reading-ergonomics vink=cem-typography-voice-ink-thickness vicon=cem-typography-voice-icon-stroke-multiplier vvol=cem-typography-voice-speech-volume vrate=cem-typography-voice-speech-rate vpitch=cem-typography-voice-speech-pitch vssml=cem-typography-voice-ssml-emphasis roles=cem-typography-roles vinkdark=cem-typography-voice-ink-thickness-dark vinkcontrast=cem-typography-voice-ink-thickness-contrast">
{table |
    {caption | {a @href="../../../dist/lib/tokens/cem-voice-fonts-typography.xhtml#12-1-foundation" | cem-typography-fontography} — semantic family stacks}
    {thead | {tr | {th | Token}{th | Value}{th | Sample}{th | Tier}{th | Description}}}
    {tbody | {cem:for-each @select="$datadom.slices.font" @as="row" |
        {tr |
            {th | {code | {$row.td1}}}
            {td | {code | {$row.td2}}}
            {td | {span @class=type-sample @style="font-family: var({$row.td1});" | Reading UI 123}}
            {td | {$row.td4}}
            {td | {$row.td3}}
        }}}
}
{hr | }
{table |
    {caption | typography primitives — thickness, size, line-height, letter-spacing, feature, reading-ergonomics}
    {thead | {tr | {th | Token}{th | Value}{th | Tier}{th | Description}}}
    {tbody | {cem:for-each @select="$datadom.slices.thick" @as="row" |{tr | {th | {code | {$row.td1}}}{td | {code | {$row.td2}}}{td | {$row.td4}}{td | {$row.td3}}}}{cem:for-each @select="$datadom.slices.size" @as="row" |{tr | {th | {code | {$row.td1}}}{td | {code | {$row.td2}}}{td | {$row.td4}}{td | {$row.td3}}}}{cem:for-each @select="$datadom.slices.lh" @as="row" |{tr | {th | {code | {$row.td1}}}{td | {code | {$row.td2}}}{td | {$row.td4}}{td | {$row.td3}}}}{cem:for-each @select="$datadom.slices.ls" @as="row" |{tr | {th | {code | {$row.td1}}}{td | {code | {$row.td2}}}{td | {$row.td4}}{td | {$row.td3}}}}{cem:for-each @select="$datadom.slices.feat" @as="row" |{tr | {th | {code | {$row.td1}}}{td | {code | {$row.td2}}}{td | {$row.td4}}{td | {$row.td3}}}}{cem:for-each @select="$datadom.slices.readerg" @as="row" |{tr | {th | {code | {$row.td1}}}{td | {code | {$row.td2}}}{td | {$row.td4}}{td | {$row.td3}}}}}
}
{hr | }
{table |
    {caption | voice metadata — ink-thickness, icon-stroke, speech volume/rate/pitch, ssml-emphasis}
    {thead | {tr | {th | Token}{th | Value}{th | Tier}{th | Description}}}
    {tbody | {cem:for-each @select="$datadom.slices.vink" @as="row" |{tr | {th | {code | {$row.td1}}}{td | {code | {$row.td2}}}{td | {$row.td4}}{td | {$row.td3}}}}{cem:for-each @select="$datadom.slices.vicon" @as="row" |{tr | {th | {code | {$row.td1}}}{td | {code | {$row.td2}}}{td | {$row.td4}}{td | {$row.td3}}}}{cem:for-each @select="$datadom.slices.vvol" @as="row" |{tr | {th | {code | {$row.td1}}}{td | {code | {$row.td2}}}{td | {$row.td4}}{td | {$row.td3}}}}{cem:for-each @select="$datadom.slices.vrate" @as="row" |{tr | {th | {code | {$row.td1}}}{td | {code | {$row.td2}}}{td | {$row.td4}}{td | {$row.td3}}}}{cem:for-each @select="$datadom.slices.vpitch" @as="row" |{tr | {th | {code | {$row.td1}}}{td | {code | {$row.td2}}}{td | {$row.td4}}{td | {$row.td3}}}}{cem:for-each @select="$datadom.slices.vssml" @as="row" |{tr | {th | {code | {$row.td1}}}{td | {code | {$row.td2}}}{td | {$row.td4}}{td | {$row.td3}}}}}
}
{hr | }
{table |
    {caption | {a @href="../../../dist/lib/tokens/cem-voice-fonts-typography.xhtml#cem-typography-roles" | cem-typography-roles} — semantic role endpoints}
    {thead | {tr | {th | Token}{th | Value}{th | Tier}{th | Description}}}
    {tbody | {cem:for-each @select="$datadom.slices.roles" @as="row" |
        {tr | {th | {code | {$row.td1}}}{td | {code | {$row.td2}}}{td | {$row.td4}}{td | {$row.td3}}}}}
}
{hr | }
{pre @class=language-css | {code @class=language-css @data-generated-css |```:root {
  /* region 1) fontography — semantic family stacks */```{cem:for-each @select="$datadom.slices.font" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion fontography */

  /* region 2) thickness — 7-step weight scale */```{cem:for-each @select="$datadom.slices.thick" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion thickness */

  /* region 3) size — 7-step rem-based size scale */```{cem:for-each @select="$datadom.slices.size" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion size */

  /* region 4) line-height primitives */```{cem:for-each @select="$datadom.slices.lh" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion line-height */

  /* region 5) letter-spacing primitives */```{cem:for-each @select="$datadom.slices.ls" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion letter-spacing */

  /* region 6) typography feature policies */```{cem:for-each @select="$datadom.slices.feat" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion feature policies */

  /* region 7) reading ergonomics */```{cem:for-each @select="$datadom.slices.readerg" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion reading ergonomics */

  /* region 8) voice — ink-thickness (drives font-weight) */```{cem:for-each @select="$datadom.slices.vink" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion voice ink-thickness */

  /* region 9) voice — icon-stroke multipliers */```{cem:for-each @select="$datadom.slices.vicon" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion voice icon-stroke */

  /* region 10) voice — speech-volume (TTS adapter input, not screen-reader) */```{cem:for-each @select="$datadom.slices.vvol" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion voice speech-volume */

  /* region 11) voice — speech-rate */```{cem:for-each @select="$datadom.slices.vrate" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion voice speech-rate */

  /* region 12) voice — speech-pitch */```{cem:for-each @select="$datadom.slices.vpitch" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion voice speech-pitch */

  /* region 13) voice — ssml-emphasis */```{cem:for-each @select="$datadom.slices.vssml" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion voice ssml-emphasis */

  /* region 14) semantic role endpoints — 8 roles × ~9-10 properties each */```{cem:for-each @select="$datadom.slices.roles" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion semantic role endpoints */
}

/* region dark theme — lighter ink to compensate for perceived boldness on dark backgrounds */
.cem-theme-dark, [data-theme="cem-theme-dark"],
.cem-theme-contrast-dark, [data-theme="cem-theme-contrast-dark"] {```{cem:for-each @select="$datadom.slices.vinkdark" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
}
/* endregion dark theme */

/* region contrast theme — stronger ink for visibility (overrides dark for shared rows) */
.cem-theme-contrast-light, [data-theme="cem-theme-contrast-light"],
.cem-theme-contrast-dark, [data-theme="cem-theme-contrast-dark"] {```{cem:for-each @select="$datadom.slices.vinkcontrast" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
}
/* endregion contrast theme */
```}}
</template>
<main></main>
<cem-css-loader></cem-css-loader>
<script src="./cem-css-loader.js" type="module"></script>
<script src="./cem-css-generator.js" type="module"></script>
</body>
</html>
