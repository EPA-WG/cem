<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CEM timing CSS generator</title>
    <style>
        main { display: block; white-space: pre; font-family: monospace; }
        table { white-space: normal; border-collapse: collapse; }
        td { padding: 0.5rem; letter-spacing: 0.05em; }
        caption { font-size: 1.5rem; padding-bottom: 0.5rem; text-align: start; }
        tr>th:first-child { text-align: start; }
        code { color: green; font-weight: bold; }
    </style>
</head>
<body>
<!--
  Phase 3.6 CEM-ML/CEM-QL generator (Option B). cem-css-generator.js shapes the token tables into
  datadom.slices via the cem-elements DOM→datadom bridge and renders this template through the
  cem_ql WASM boundary; no live browser XSLT. Columns — durations/easings: td1=token td2=value
  td3=desc td4=tier; reduced-motion: td1=token td2=value td3=desc.
-->
<template type="cem-ml; version=0.0"
          id="cem-timing-template"
          data-token-url="../../../dist/lib/tokens/cem-timing.xhtml"
          data-slices="durations=cem-timing-durations easings=cem-timing-easings reduced=cem-timing-reduced-motion">
{table |
    {caption | {a @href="../../../dist/lib/tokens/cem-timing.xhtml#4-1-duration-tokens-required" | cem-timing-durations} — duration scale}
    {thead | {tr | {th | Token}{th | Value}{th | Tier}{th | Demo}{th | Description}}}
    {tbody | {cem:for-each @select="$datadom.slices.durations" @as="row" |
        {tr |
            {th | {code | {$row.td1}}}
            {td | {code | {$row.td2}}}
            {td | {$row.td4}}
            {td | {div @style="width:2rem; height:2rem; background:currentColor; transition: transform var({$row.td1}) var(--cem-easing-smooth,ease-in-out);" @onmouseenter="this.style.transform='scale(1.5)'" @onmouseleave="this.style.transform=''" | }}
            {td | {$row.td3}}
        }}}
}
{hr | }
{table |
    {caption | {a @href="../../../dist/lib/tokens/cem-timing.xhtml#4-2-easing-tokens-required" | cem-timing-easings} — easing curves}
    {thead | {tr | {th | Token}{th | Value}{th | Tier}{th | Demo}{th | Description}}}
    {tbody | {cem:for-each @select="$datadom.slices.easings" @as="row" |
        {tr |
            {th | {code | {$row.td1}}}
            {td | {code | {$row.td2}}}
            {td | {$row.td4}}
            {td | {div @style="width:2rem; height:2rem; background:currentColor; transition: transform var(--cem-duration-noticeable,250ms) var({$row.td1});" @onmouseenter="this.style.transform='scale(1.5)'" @onmouseleave="this.style.transform=''" | }}
            {td | {$row.td3}}
        }}}
}
{hr | }
{table |
    {caption | {a @href="../../../dist/lib/tokens/cem-timing.xhtml#4-4-reduced-motion-overrides" | cem-timing-reduced-motion} — prefers-reduced-motion overrides}
    {thead | {tr | {th | Token}{th | Reduced value}{th | Description}}}
    {tbody | {cem:for-each @select="$datadom.slices.reduced" @as="row" |
        {tr | {th | {code | {$row.td1}}}{td | {code | {$row.td2}}}{td | {$row.td3}}}}}
}
{hr | }
{pre @class=language-css | {code @class=language-css @data-generated-css |```:root {
  /* region durations: cem-duration-[bucket] */```{cem:for-each @select="$datadom.slices.durations" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion durations */

  /* region easings: cem-easing-[intent] */```{cem:for-each @select="$datadom.slices.easings" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion easings */
}

/* region prefers-reduced-motion: shorten durations, preserve ordering */
@media (prefers-reduced-motion: reduce) {
  :root {```{cem:for-each @select="$datadom.slices.reduced" @as="row" |```
    ```{$row.td1}: {$row.td2};}```
  }
}
/* endregion prefers-reduced-motion */
```}}
</template>
<main></main>
<cem-css-loader></cem-css-loader>
<script src="./cem-css-loader.js" type="module"></script>
<script src="./cem-css-generator.js" type="module"></script>
</body>
</html>
