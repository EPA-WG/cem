<!DOCTYPE html>
<html lang="en" xmlns:xhtml="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>CEM coupling CSS generator</title>
    <script src="./cem-http-request.js" type="module"></script>
</head>
<body>
<custom-element>
    <template id="cem-coupling-template">
        <style>
            td { padding: 0.5rem; letter-spacing: 0.05em; }
            caption { font-size: 1.5rem; padding-bottom: 0.5rem; text-align: start; }
            tr>th:first-child { text-align: start; }
            code { color: green; font-weight: bold; }
        </style>

        <http-request method="GET" slice="cem-coupling" url="../../../dist/lib/tokens/cem-coupling.xhtml"></http-request>
        <variable name="couplingData" select="//cem-coupling"></variable>

        <variable name="cem-coupling-minimums"
                  select="$couplingData//*[@id='cem-coupling-minimums']/following-sibling::xhtml:table[1]/xhtml:tbody"></variable>
        <variable name="cem-coupling-halo-overrides"
                  select="$couplingData//*[@id='cem-coupling-halo-overrides']/following-sibling::xhtml:table[1]/xhtml:tbody"></variable>

        <variable name="css-body">
:root {
    /* region coupling minimums — mode-invariant safety anchors */
    <for-each select="$cem-coupling-minimums/xhtml:tr">
        {normalize-space(xhtml:td[1])}: {normalize-space(xhtml:td[2])};
    </for-each>
    /* endregion coupling minimums */
}

/* region coupling mode: forgiving — halo policy only (visuals owned by D2c Controls) */
:root[data-cem-coupling="forgiving"] {
    <for-each select="$cem-coupling-halo-overrides/xhtml:tr">
        {normalize-space(xhtml:td[1])}: {normalize-space(xhtml:td[2])};
    </for-each>
}
/* endregion coupling mode: forgiving */

/* region coupling mode: compact — halo policy only (visuals owned by D2c Controls) */
:root[data-cem-coupling="compact"] {
    <for-each select="$cem-coupling-halo-overrides/xhtml:tr">
        {normalize-space(xhtml:td[1])}: {normalize-space(xhtml:td[3])};
    </for-each>
}
/* endregion coupling mode: compact */
        </variable>

        <style>
            :host {
                display: block;
                white-space: pre;
                font-family: monospace;
            }
        </style>

        <xhtml:table>
            <xhtml:caption><a href="../../../dist/lib/tokens/cem-coupling.xhtml#4-1-hard-safety-minimums-policy-anchors">cem-coupling-minimums</a> — hard safety minimums (mode-invariant)</xhtml:caption>
            <xhtml:thead>
                <xhtml:tr>
                    <xhtml:th>Token</xhtml:th>
                    <xhtml:th>Value</xhtml:th>
                    <xhtml:th>Tier</xhtml:th>
                    <xhtml:th>Swatch</xhtml:th>
                    <xhtml:th>Description</xhtml:th>
                </xhtml:tr>
            </xhtml:thead>
            <xhtml:tbody>
                <for-each select="$cem-coupling-minimums/xhtml:tr">
                    <variable name="token" select="normalize-space(xhtml:td[1])"></variable>
                    <variable name="value" select="normalize-space(xhtml:td[2])"></variable>
                    <variable name="desc"  select="normalize-space(xhtml:td[3])"></variable>
                    <variable name="tier"  select="normalize-space(xhtml:td[4])"></variable>
                    <xhtml:tr>
                        <xhtml:th><code>{$token}</code></xhtml:th>
                        <xhtml:td><code>{$value}</code></xhtml:td>
                        <xhtml:td>{$tier}</xhtml:td>
                        <xhtml:td style="width:5rem;">
                            <xhtml:div style="height:1rem; width: var({$token}); background: currentColor; min-width: 2px; max-width: 8rem;" title="{$token}"></xhtml:div>
                        </xhtml:td>
                        <xhtml:td>{$desc}</xhtml:td>
                    </xhtml:tr>
                </for-each>
            </xhtml:tbody>
        </xhtml:table>

        <hr/>
        <xhtml:table>
            <xhtml:caption><a href="../../../dist/lib/tokens/cem-coupling.xhtml#5-2-mode-switch-halo-policy">cem-coupling-halo-overrides</a> — coupling mode halo overrides (visuals owned by D2c Controls)</xhtml:caption>
            <xhtml:thead>
                <xhtml:tr>
                    <xhtml:th>Token</xhtml:th>
                    <xhtml:th>forgiving</xhtml:th>
                    <xhtml:th>compact</xhtml:th>
                </xhtml:tr>
            </xhtml:thead>
            <xhtml:tbody>
                <for-each select="$cem-coupling-halo-overrides/xhtml:tr">
                    <variable name="token"     select="normalize-space(xhtml:td[1])"></variable>
                    <variable name="forgiving" select="normalize-space(xhtml:td[2])"></variable>
                    <variable name="compact"   select="normalize-space(xhtml:td[3])"></variable>
                    <xhtml:tr>
                        <xhtml:th><code>{$token}</code></xhtml:th>
                        <xhtml:td><code>{$forgiving}</code></xhtml:td>
                        <xhtml:td><code>{$compact}</code></xhtml:td>
                    </xhtml:tr>
                </for-each>
            </xhtml:tbody>
        </xhtml:table>

        <hr/>
        <pre class="language-css">
            <code class="language-css" data-generated-css>
{$css-body}
            </code>
        </pre>
        <cem-css-loader value="{$css-body}"></cem-css-loader>

    </template>
</custom-element>
<main></main>
<script src="../../../../../node_modules/@epa-wg/custom-element/custom-element.js" type="module"></script>
<script src="../../../../../node_modules/@epa-wg/custom-element/http-request.js" type="module"></script>
<script src="./cem-css-loader.js" type="module"></script>
</body>
</html>
