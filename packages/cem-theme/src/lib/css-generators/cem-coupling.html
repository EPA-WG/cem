<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CEM coupling CSS generator</title>
    <style>
        main { display: block; white-space: pre; font-family: monospace; }
        table { white-space: normal; border-collapse: collapse; }
        td { padding: 0.5rem; letter-spacing: 0.05em; }
        caption { font-size: 1.5rem; padding-bottom: 0.5rem; text-align: start; }
        tr>th:first-child { text-align: start; }
        code { color: green; font-weight: bold; }
    </style>
</head>
<body>
<!--
  Phase 3.6 CEM-ML/CEM-QL generator (Option B). The legacy @epa-wg/custom-element XSLT/XPath
  runtime is gone: cem-css-generator.js shapes the token tables into datadom.slices via the
  cem-elements DOM→datadom bridge and renders this template through the cem_ql WASM boundary.
  Token table columns — minimums: td1=token td2=value td3=description td4=tier;
  overrides: td1=token td2=forgiving td3=compact.
-->
<template type="cem-ml; version=0.0"
          id="cem-coupling-template"
          data-token-url="../../../dist/lib/tokens/cem-coupling.xhtml"
          data-slices="minimums=cem-coupling-minimums overrides=cem-coupling-halo-overrides">
{table |
    {caption | {a @href="../../../dist/lib/tokens/cem-coupling.xhtml#4-1-hard-safety-minimums-policy-anchors" | cem-coupling-minimums} — hard safety minimums (mode-invariant)}
    {thead | {tr | {th | Token}{th | Value}{th | Tier}{th | Swatch}{th | Description}}}
    {tbody | {cem:for-each @select="$datadom.slices.minimums" @as="row" |
        {tr |
            {th | {code | {$row.td1}}}
            {td | {code | {$row.td2}}}
            {td | {$row.td4}}
            {td @style="width:5rem;" | {div @style="height:1rem; width: var({$row.td1}); background: currentColor; min-width: 2px; max-width: 8rem;" @title="{$row.td1}" | }}
            {td | {$row.td3}}
        }}}
}
{hr | }
{table |
    {caption | {a @href="../../../dist/lib/tokens/cem-coupling.xhtml#5-2-mode-switch-halo-policy" | cem-coupling-halo-overrides} — coupling mode halo overrides (visuals owned by D2c Controls)}
    {thead | {tr | {th | Token}{th | forgiving}{th | compact}}}
    {tbody | {cem:for-each @select="$datadom.slices.overrides" @as="row" |
        {tr |
            {th | {code | {$row.td1}}}
            {td | {code | {$row.td2}}}
            {td | {code | {$row.td3}}}
        }}}
}
{hr | }
{pre @class=language-css | {code @class=language-css @data-generated-css |```:root {
  /* region coupling minimums — mode-invariant safety anchors */```{cem:for-each @select="$datadom.slices.minimums" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion coupling minimums */
}

/* region coupling mode: forgiving — halo policy only (visuals owned by D2c Controls) */
:root[data-cem-coupling="forgiving"] {```{cem:for-each @select="$datadom.slices.overrides" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
}
/* endregion coupling mode: forgiving */

/* region coupling mode: compact — halo policy only (visuals owned by D2c Controls) */
:root[data-cem-coupling="compact"] {```{cem:for-each @select="$datadom.slices.overrides" @as="row" |```
  ```{$row.td1}: {$row.td3};}```
}
/* endregion coupling mode: compact */
```}}
</template>
<main></main>
<cem-css-loader></cem-css-loader>
<script src="./cem-css-loader.js" type="module"></script>
<script src="./cem-css-generator.js" type="module"></script>
</body>
</html>
