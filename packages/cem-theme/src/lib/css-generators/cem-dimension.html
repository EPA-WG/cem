<!DOCTYPE html>
<html lang="en" xmlns:xhtml="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>CEM dimension CSS generator</title>
    <script src="./cem-http-request.js" type="module"></script>
</head>
<body>
<custom-element>
    <template id="cem-dimension-template">
        <style>
            td { padding: 0.5rem; letter-spacing: 0.05em; }
            caption { font-size: 1.5rem; padding-bottom: 0.5rem; text-align: start; }
            tr>th:first-child { text-align: start; }
            code { color: green; font-weight: bold; }
            section table { margin-top: 1rem; }
        </style>

        <http-request method="GET" slice="cem-dimension" url="../../../dist/lib/tokens/cem-dimension.xhtml"></http-request>
        <variable name="dimData" select="//cem-dimension"></variable>

        <variable name="cem-dim-scale"
                  select="$dimData//*[@id='cem-dim-scale']/following-sibling::xhtml:table[1]/xhtml:tbody"></variable>
        <variable name="cem-dim-gaps"
                  select="$dimData//*[@id='cem-dim-gaps']/following-sibling::xhtml:table[1]/xhtml:tbody"></variable>
        <variable name="cem-dim-insets"
                  select="$dimData//*[@id='cem-dim-insets']/following-sibling::xhtml:table[1]/xhtml:tbody"></variable>
        <variable name="cem-dim-rhythm-reading"
                  select="$dimData//*[@id='cem-dim-rhythm-reading']/following-sibling::xhtml:table[1]/xhtml:tbody"></variable>
        <variable name="cem-dim-rhythm-data"
                  select="$dimData//*[@id='cem-dim-rhythm-data']/following-sibling::xhtml:table[1]/xhtml:tbody"></variable>
        <variable name="cem-dim-layout"
                  select="$dimData//*[@id='cem-dim-layout']/following-sibling::xhtml:table[1]/xhtml:tbody"></variable>
        <variable name="cem-dim-spacing-overrides"
                  select="$dimData//*[@id='cem-dim-spacing-overrides']/following-sibling::xhtml:table[1]/xhtml:tbody"></variable>

        <variable name="css-body">
:root {
    /* region dimension scale: cem-dim-[size] */
    <for-each select="$cem-dim-scale/xhtml:tr">
        {normalize-space(xhtml:td[1])}: {normalize-space(xhtml:td[2])};
    </for-each>
    /* endregion dimension scale */

    /* region relationship gaps: cem-gap-[level] */
    <for-each select="$cem-dim-gaps/xhtml:tr">
        {normalize-space(xhtml:td[1])}: {normalize-space(xhtml:td[2])};
    </for-each>
    /* endregion gaps */

    /* region insets: cem-inset-[level] */
    <for-each select="$cem-dim-insets/xhtml:tr">
        {normalize-space(xhtml:td[1])}: {normalize-space(xhtml:td[2])};
    </for-each>
    /* endregion insets */

    /* region reading rhythm: cem-rhythm-reading-[level] */
    <for-each select="$cem-dim-rhythm-reading/xhtml:tr">
        {normalize-space(xhtml:td[1])}: {normalize-space(xhtml:td[2])};
    </for-each>
    /* endregion reading rhythm */

    /* region data rhythm: cem-rhythm-data-[level] */
    <for-each select="$cem-dim-rhythm-data/xhtml:tr">
        {normalize-space(xhtml:td[1])}: {normalize-space(xhtml:td[2])};
    </for-each>
    /* endregion data rhythm */

    /* region layout tokens: cem-layout-[purpose] (excludes deprecated) */
    <for-each select="$cem-dim-layout/xhtml:tr[normalize-space(xhtml:td[4]) != 'deprecated']">
        {normalize-space(xhtml:td[1])}: {normalize-space(xhtml:td[2])};
    </for-each>
    /* endregion layout tokens */
}

/* region spacing mode: dense */
:root[data-cem-spacing="dense"] {
    <for-each select="$cem-dim-spacing-overrides/xhtml:tr">
        {normalize-space(xhtml:td[1])}: {normalize-space(xhtml:td[2])};
    </for-each>
}
/* endregion spacing mode: dense */

/* region spacing mode: sparse */
:root[data-cem-spacing="sparse"] {
    <for-each select="$cem-dim-spacing-overrides/xhtml:tr">
        {normalize-space(xhtml:td[1])}: {normalize-space(xhtml:td[3])};
    </for-each>
}
/* endregion spacing mode: sparse */
        </variable>

        <style>
            :host {
                display: block;
                white-space: pre;
                font-family: monospace;
            }
        </style>

        <xhtml:table>
            <xhtml:caption><a href="../../../dist/lib/tokens/cem-dimension.xhtml#5-1-primary-dimension-scale-semantic-css">cem-dim-scale</a> — dimension scale</xhtml:caption>
            <xhtml:thead>
                <xhtml:tr>
                    <xhtml:th>Token</xhtml:th>
                    <xhtml:th>Value</xhtml:th>
                    <xhtml:th>Description</xhtml:th>
                </xhtml:tr>
            </xhtml:thead>
            <xhtml:tbody>
                <for-each select="$cem-dim-scale/xhtml:tr">
                    <variable name="token" select="normalize-space(xhtml:td[1])"></variable>
                    <variable name="value" select="normalize-space(xhtml:td[2])"></variable>
                    <variable name="desc"  select="normalize-space(xhtml:td[3])"></variable>
                    <xhtml:tr>
                        <xhtml:th><code>{$token}</code></xhtml:th>
                        <xhtml:td style="width:5rem; background-color: var(--cem-palette-comfort, #fff)">
                            <xhtml:div style="height: {$value}; background: currentColor; min-height: 2px; max-height: 8rem;" title="{$token}: {$value}"></xhtml:div>
                        </xhtml:td>
                        <xhtml:td><code>{$value}</code> — {$desc}</xhtml:td>
                    </xhtml:tr>
                </for-each>
            </xhtml:tbody>
        </xhtml:table>

        <hr/>
        <xhtml:table>
            <xhtml:caption><a href="../../../dist/lib/tokens/cem-dimension.xhtml#6-1-relationship-gaps-between-items">cem-dim-gaps</a> + <a href="../../../dist/lib/tokens/cem-dimension.xhtml#6-2-insets-inside-a-surface">cem-dim-insets</a> — semantic spacing endpoints</xhtml:caption>
            <xhtml:thead>
                <xhtml:tr>
                    <xhtml:th>Token</xhtml:th>
                    <xhtml:th>Value</xhtml:th>
                    <xhtml:th>Swatch</xhtml:th>
                    <xhtml:th>Description</xhtml:th>
                </xhtml:tr>
            </xhtml:thead>
            <xhtml:tbody>
                <for-each select="$cem-dim-gaps/xhtml:tr | $cem-dim-insets/xhtml:tr">
                    <variable name="token" select="normalize-space(xhtml:td[1])"></variable>
                    <variable name="value" select="normalize-space(xhtml:td[2])"></variable>
                    <variable name="desc"  select="normalize-space(xhtml:td[3])"></variable>
                    <xhtml:tr>
                        <xhtml:th><code>{$token}</code></xhtml:th>
                        <xhtml:td><code>{$value}</code></xhtml:td>
                        <xhtml:td style="width:5rem;">
                            <xhtml:div style="height:1rem; width: var({$token}); background: currentColor; min-width: 2px; max-width: 8rem;" title="{$token}"></xhtml:div>
                        </xhtml:td>
                        <xhtml:td>{$desc}</xhtml:td>
                    </xhtml:tr>
                </for-each>
            </xhtml:tbody>
        </xhtml:table>

        <hr/>
        <xhtml:table>
            <xhtml:caption><a href="../../../dist/lib/tokens/cem-dimension.xhtml#7-4-layout-token-table">cem-dim-layout</a> — layout rhythm tokens</xhtml:caption>
            <xhtml:thead>
                <xhtml:tr>
                    <xhtml:th>Token</xhtml:th>
                    <xhtml:th>Value</xhtml:th>
                    <xhtml:th>Tier</xhtml:th>
                    <xhtml:th>Description</xhtml:th>
                </xhtml:tr>
            </xhtml:thead>
            <xhtml:tbody>
                <for-each select="$cem-dim-layout/xhtml:tr">
                    <variable name="token" select="normalize-space(xhtml:td[1])"></variable>
                    <variable name="value" select="normalize-space(xhtml:td[2])"></variable>
                    <variable name="desc"  select="normalize-space(xhtml:td[3])"></variable>
                    <variable name="tier"  select="normalize-space(xhtml:td[4])"></variable>
                    <xhtml:tr>
                        <xhtml:th><code>{$token}</code></xhtml:th>
                        <xhtml:td><code>{$value}</code></xhtml:td>
                        <xhtml:td>{$tier}</xhtml:td>
                        <xhtml:td>{$desc}</xhtml:td>
                    </xhtml:tr>
                </for-each>
            </xhtml:tbody>
        </xhtml:table>

        <hr/>
        <xhtml:table>
            <xhtml:caption><a href="../../../dist/lib/tokens/cem-dimension.xhtml#8-2-concrete-overrides-recommended-default-mapping">cem-dim-spacing-overrides</a> — density mode overrides</xhtml:caption>
            <xhtml:thead>
                <xhtml:tr>
                    <xhtml:th>Token</xhtml:th>
                    <xhtml:th>dense</xhtml:th>
                    <xhtml:th>sparse</xhtml:th>
                </xhtml:tr>
            </xhtml:thead>
            <xhtml:tbody>
                <for-each select="$cem-dim-spacing-overrides/xhtml:tr">
                    <variable name="token"  select="normalize-space(xhtml:td[1])"></variable>
                    <variable name="dense"  select="normalize-space(xhtml:td[2])"></variable>
                    <variable name="sparse" select="normalize-space(xhtml:td[3])"></variable>
                    <xhtml:tr>
                        <xhtml:th><code>{$token}</code></xhtml:th>
                        <xhtml:td><code>{$dense}</code></xhtml:td>
                        <xhtml:td><code>{$sparse}</code></xhtml:td>
                    </xhtml:tr>
                </for-each>
            </xhtml:tbody>
        </xhtml:table>

        <hr/>
        <pre class="language-css">
            <code class="language-css" data-generated-css>
{$css-body}
            </code>
        </pre>
        <cem-css-loader value="{$css-body}"></cem-css-loader>

    </template>
</custom-element>
<main></main>
<script src="../../../../../node_modules/@epa-wg/custom-element/custom-element.js" type="module"></script>
<script src="../../../../../node_modules/@epa-wg/custom-element/http-request.js" type="module"></script>
<script src="./cem-css-loader.js" type="module"></script>
</body>
</html>
