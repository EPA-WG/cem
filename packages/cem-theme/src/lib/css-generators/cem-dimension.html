<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CEM dimension CSS generator</title>
    <style>
        main { display: block; white-space: pre; font-family: monospace; }
        table { white-space: normal; border-collapse: collapse; }
        td { padding: 0.5rem; letter-spacing: 0.05em; }
        caption { font-size: 1.5rem; padding-bottom: 0.5rem; text-align: start; }
        tr>th:first-child { text-align: start; }
        code { color: green; font-weight: bold; }
    </style>
</head>
<body>
<!--
  Phase 3.6 CEM-ML/CEM-QL generator (Option B). cem-css-generator.js shapes the token tables into
  datadom.slices via the cem-elements DOM→datadom bridge and renders this template through the
  cem_ql WASM boundary; no live browser XSLT. Columns — scale: td1=token td2=value td3=desc;
  gaps/insets: td1=token td2=value td3=desc; layout: td1=token td2=value td3=desc td4=tier;
  overrides: td1=token td2=dense td3=sparse. @test uses bare cem-ql names + double-quoted strings.
-->
<template type="cem-ml; version=0.0"
          id="cem-dimension-template"
          data-token-url="../../../dist/lib/tokens/cem-dimension.xhtml"
          data-slices="scale=cem-dim-scale gaps=cem-dim-gaps insets=cem-dim-insets rreading=cem-dim-rhythm-reading rdata=cem-dim-rhythm-data layout=cem-dim-layout overrides=cem-dim-spacing-overrides">
{table |
    {caption | {a @href="../../../dist/lib/tokens/cem-dimension.xhtml#5-1-primary-dimension-scale-semantic-css" | cem-dim-scale} — dimension scale}
    {thead | {tr | {th | Token}{th | Value}{th | Description}}}
    {tbody | {cem:for-each @select="$datadom.slices.scale" @as="row" |
        {tr |
            {th | {code | {$row.td1}}}
            {td @style="width:5rem; background-color: var(--cem-palette-comfort, #fff)" | {div @style="height: {$row.td2}; background: currentColor; min-height: 2px; max-height: 8rem;" @title="{$row.td1}" | }}
            {td | {code | {$row.td2}} — {$row.td3}}
        }}}
}
{hr | }
{table |
    {caption | {a @href="../../../dist/lib/tokens/cem-dimension.xhtml#6-1-relationship-gaps-between-items" | cem-dim-gaps} + {a @href="../../../dist/lib/tokens/cem-dimension.xhtml#6-2-insets-inside-a-surface" | cem-dim-insets} — semantic spacing endpoints}
    {thead | {tr | {th | Token}{th | Value}{th | Swatch}{th | Description}}}
    {tbody | {cem:for-each @select="$datadom.slices.gaps" @as="row" |
        {tr | {th | {code | {$row.td1}}}{td | {code | {$row.td2}}}{td @style="width:5rem;" | {div @style="height:1rem; width: var({$row.td1}); background: currentColor; min-width: 2px; max-width: 8rem;" @title="{$row.td1}" | }}{td | {$row.td3}}}}{cem:for-each @select="$datadom.slices.insets" @as="row" |
        {tr | {th | {code | {$row.td1}}}{td | {code | {$row.td2}}}{td @style="width:5rem;" | {div @style="height:1rem; width: var({$row.td1}); background: currentColor; min-width: 2px; max-width: 8rem;" @title="{$row.td1}" | }}{td | {$row.td3}}}}}
}
{hr | }
{table |
    {caption | {a @href="../../../dist/lib/tokens/cem-dimension.xhtml#7-4-layout-token-table" | cem-dim-layout} — layout rhythm tokens}
    {thead | {tr | {th | Token}{th | Value}{th | Tier}{th | Description}}}
    {tbody | {cem:for-each @select="$datadom.slices.layout" @as="row" |
        {tr | {th | {code | {$row.td1}}}{td | {code | {$row.td2}}}{td | {$row.td4}}{td | {$row.td3}}}}}
}
{hr | }
{table |
    {caption | {a @href="../../../dist/lib/tokens/cem-dimension.xhtml#8-2-concrete-overrides-recommended-default-mapping" | cem-dim-spacing-overrides} — density mode overrides}
    {thead | {tr | {th | Token}{th | dense}{th | sparse}}}
    {tbody | {cem:for-each @select="$datadom.slices.overrides" @as="row" |
        {tr | {th | {code | {$row.td1}}}{td | {code | {$row.td2}}}{td | {code | {$row.td3}}}}}}
}
{hr | }
{pre @class=language-css | {code @class=language-css @data-generated-css |```:root {
  /* region dimension scale: cem-dim-[size] */```{cem:for-each @select="$datadom.slices.scale" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion dimension scale */

  /* region relationship gaps: cem-gap-[level] */```{cem:for-each @select="$datadom.slices.gaps" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion gaps */

  /* region insets: cem-inset-[level] */```{cem:for-each @select="$datadom.slices.insets" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion insets */

  /* region reading rhythm: cem-rhythm-reading-[level] */```{cem:for-each @select="$datadom.slices.rreading" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion reading rhythm */

  /* region data rhythm: cem-rhythm-data-[level] */```{cem:for-each @select="$datadom.slices.rdata" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion data rhythm */

  /* region layout tokens: cem-layout-[purpose] (excludes deprecated) */```{cem:for-each @select="$datadom.slices.layout" @as="row" |{cem:if @test='row.td4 != "deprecated"' |```
  ```{$row.td1}: {$row.td2};}}```
  /* endregion layout tokens */
}

/* region spacing mode: dense */
:root[data-cem-spacing="dense"] {```{cem:for-each @select="$datadom.slices.overrides" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
}
/* endregion spacing mode: dense */

/* region spacing mode: sparse */
:root[data-cem-spacing="sparse"] {```{cem:for-each @select="$datadom.slices.overrides" @as="row" |```
  ```{$row.td1}: {$row.td3};}```
}
/* endregion spacing mode: sparse */
```}}
</template>
<main></main>
<cem-css-loader></cem-css-loader>
<script src="./cem-css-loader.js" type="module"></script>
<script src="./cem-css-generator.js" type="module"></script>
</body>
</html>
