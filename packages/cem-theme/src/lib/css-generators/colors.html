<!DOCTYPE html>
<html lang="en" xmlns:xslt="http://www.w3.org/1999/xhtml" xmlns:xhtml="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>CEM colors CSS generator</title>
</head>
<body>
<custom-element>
    <template>
        <http-request method="GET" slice="cem-colors" url="../../../dist/lib/tokens/cem-colors.xhtml"></http-request>
        <variable name="colorsData" select="//cem-colors"></variable>
        <variable name="cem-color-hue-variant"
                  select="$colorsData//*[@id='cem-color-hue-variant']/following-sibling::xhtml:table[1]/xhtml:tbody"></variable>
        <variable name="css-body">

:root{
    /* branded colors: cem-color-[hue]-[variant] */

    <for-each select="$cem-color-hue-variant/xhtml:tr">
        {./*[1]} : {./*[4]} ; /* {./*[5]} ; {./*[6]} */
    </for-each>

    /* emotion palette: cem-palette-[emotion]-[shift] */
    <variable name="cem-palette-emotion-heading" select="$colorsData//*[@id='cem-palette-emotion-shift']"></variable>
    <variable name="cem-palette-emotion"
              select="$cem-palette-emotion-heading/following-sibling::xhtml:table[1]/xhtml:tbody"></variable>
    /* light/dark */
    <for-each select="$cem-palette-emotion/xhtml:tr">
        <variable name="emotion" select="xhtml:td[1]"></variable>
        <variable name="light-val" select="xhtml:td[3]"></variable>
        <variable name="dark-val" select="xhtml:td[4]"></variable>
        <choose>
            <when test="$dark-val">
              {$emotion}: light-dark(var( $light-val ), var( $dark-val ) );
            </when>
            <otherwise>
              {$emotion}: var( $light-val );
            </otherwise>
        </choose>
    </for-each>
    /* override for native */
    .cem-theme-native,[data-theme="cem-theme-native"]{
        <for-each select="$cem-palette-emotion/xhtml:tr">
            <variable name="emotion" select="xhtml:td[1]"></variable>
            <variable name="light-val" select="xhtml:td[5]"></variable>
            <variable name="dark-val" select="xhtml:td[6]"></variable>
            <choose>
                <when test="$dark-val">
                  {$emotion}: light-dark(var( $light-val ), var( $dark-val ) );
                </when>
                <otherwise>
                  {$emotion}: var( $light-val );
                </otherwise>
            </choose>
        </for-each>
    }
}
        </variable>
        <style>
            :host {
                display: block;
                white-space: pre;
                font-family: monospace;

            }
        </style>

        <pre class="language-css">
            <code class="language-css">
{$css-body}
            </code>
        </pre>
        <cem-css-loader value="{$css-body}"></cem-css-loader>
        <input style="background-color:var(--cem-color-orange-l)" />

        <xhtml:table>
            <xhtml:thead>

                    <xhtml:th>emotion token</xhtml:th>

                    <xhtml:th> native light </xhtml:th>
                    <xhtml:th> native dark </xhtml:th>
                </xhtml:tr>
            </xhtml:thead>
            <xhtml:tbody>
        <for-each select="$cem-palette-emotion/xhtml:tr">
            <variable name="emotion" select="xhtml:td[1]"></variable>
            <xhtml:tr>

            </xhtml:tr>
        </for-each>
            </xhtml:tbody>
        </xhtml:table>
        -->
    </template>
</custom-element>
<script type="module" src="../../../../../node_modules/@epa-wg/custom-element/custom-element.js" ></script>
<script type="module" src="../../../../../node_modules/@epa-wg/custom-element/http-request.js" ></script>
<script type="module" src="./cem-css-loader.js"></script>
</body>
</html>
