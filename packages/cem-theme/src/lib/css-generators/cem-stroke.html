<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CEM stroke CSS generator</title>
    <style>
        main { display: block; white-space: pre; font-family: monospace; }
        table { white-space: normal; border-collapse: collapse; }
        td { padding: 0.5rem; letter-spacing: 0.05em; }
        caption { font-size: 1.5rem; padding-bottom: 0.5rem; text-align: start; }
        tr>th:first-child { text-align: start; }
        code { color: green; font-weight: bold; }
    </style>
</head>
<body>
<!--
  Phase 3.6 CEM-ML/CEM-QL generator (Option B). cem-css-generator.js shapes the token tables into
  datadom.slices via the cem-elements DOM→datadom bridge and renders this template through the
  cem_ql WASM boundary; no live browser XSLT. Columns — basis/semantic/zebra/rings: td1=token
  td2=value td3=desc td4=tier; forced: td1=token td2=value.
-->
<template type="cem-ml; version=0.0"
          id="cem-stroke-template"
          data-token-url="../../../dist/lib/tokens/cem-stroke.xhtml"
          data-slices="basis=cem-stroke-basis semantic=cem-stroke-semantic zebra=cem-stroke-zebra-pattern rings=cem-stroke-rings forced=cem-stroke-rings-forced">
{table |
    {caption | {a @href="../../../dist/lib/tokens/cem-stroke.xhtml#3-1-stroke-basis-tokens" | cem-stroke-basis} — stroke basis}
    {thead | {tr | {th | Token}{th | Value}{th | Tier}{th | Sample}{th | Description}}}
    {tbody | {cem:for-each @select="$datadom.slices.basis" @as="row" |
        {tr |
            {th | {code | {$row.td1}}}
            {td | {code | {$row.td2}}}
            {td | {$row.td4}}
            {td @style="width:6rem;" | {div @style="height:1.25rem; width:5rem; border-block-end: var({$row.td1}) solid currentColor;" @title="{$row.td1}" | }}
            {td | {$row.td3}}
        }}}
}
{hr | }
{table |
    {caption | {a @href="../../../dist/lib/tokens/cem-stroke.xhtml#4-1-endpoints" | cem-stroke-semantic} — semantic stroke endpoints}
    {thead | {tr | {th | Token}{th | Value}{th | Tier}{th | Sample}{th | Description}}}
    {tbody | {cem:for-each @select="$datadom.slices.semantic" @as="row" |
        {tr |
            {th | {code | {$row.td1}}}
            {td | {code | {$row.td2}}}
            {td | {$row.td4}}
            {td @style="width:6rem;" | {div @style="height:1.25rem; width:5rem; border-block-end: var({$row.td1}) solid currentColor;" @title="{$row.td1}" | }}
            {td | {$row.td3}}
        }}}
}
{hr | }
{table |
    {caption | {a @href="../../../dist/lib/tokens/cem-stroke.xhtml#5-2-canonical-zebra-tokens-d5-contract" | cem-stroke-zebra-pattern} + {a @href="../../../dist/lib/tokens/cem-stroke.xhtml#5-3-recommended-indicator-composition-box-shadow-ring" | cem-stroke-rings} — zebra-pattern geometry and ring recipes}
    {thead | {tr | {th | Token}{th | Value}{th | Tier}{th | Description}}}
    {tbody | {cem:for-each @select="$datadom.slices.zebra" @as="row" |
        {tr | {th | {code | {$row.td1}}}{td | {code | {$row.td2}}}{td | {$row.td4}}{td | {$row.td3}}}}{cem:for-each @select="$datadom.slices.rings" @as="row" |
        {tr | {th | {code | {$row.td1}}}{td | {code | {$row.td2}}}{td | {$row.td4}}{td | {$row.td3}}}}}
}
{hr | }
{table |
    {caption | {a @href="../../../dist/lib/tokens/cem-stroke.xhtml#8-2-forced-colors-high-contrast" | cem-stroke-rings-forced} — forced-colors fallback}
    {thead | {tr | {th | Token}{th | Forced-colors value}}}
    {tbody | {cem:for-each @select="$datadom.slices.forced" @as="row" |
        {tr | {th | {code | {$row.td1}}}{td | {code | {$row.td2}}}}}}
}
{hr | }
{pre @class=language-css | {code @class=language-css @data-generated-css |```:root {
  /* region stroke basis — none / hair / standard / strong */```{cem:for-each @select="$datadom.slices.basis" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion stroke basis */

  /* region semantic endpoints — boundary / divider / focus / selected / target / indicator-offset */```{cem:for-each @select="$datadom.slices.semantic" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion semantic endpoints */

  /* region zebra pattern geometry — angle only (strip-size and colors owned by D0) */```{cem:for-each @select="$datadom.slices.zebra" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion zebra pattern geometry */

  /* region ring recipes — box-shadow composition referencing D0 zebra tokens */```{cem:for-each @select="$datadom.slices.rings" @as="row" |```
  ```{$row.td1}: {$row.td2};}```
  /* endregion ring recipes */
}

/* region forced-colors fallback — collapse rings to a single Highlight outline (Principle P4) */
@media (forced-colors: active) {
  :root {```{cem:for-each @select="$datadom.slices.forced" @as="row" |```
    ```{$row.td1}: {$row.td2};}```
  }
}
/* endregion forced-colors fallback */
```}}
</template>
<main></main>
<cem-css-loader></cem-css-loader>
<script src="./cem-css-loader.js" type="module"></script>
<script src="./cem-css-generator.js" type="module"></script>
</body>
</html>
