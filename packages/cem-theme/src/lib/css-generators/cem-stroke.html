<!DOCTYPE html>
<html lang="en" xmlns:xhtml="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>CEM stroke CSS generator</title>
    <script src="./cem-http-request.js" type="module"></script>
</head>
<body>
<custom-element>
    <template id="cem-stroke-template">
        <style>
            td { padding: 0.5rem; letter-spacing: 0.05em; }
            caption { font-size: 1.5rem; padding-bottom: 0.5rem; text-align: start; }
            tr>th:first-child { text-align: start; }
            code { color: green; font-weight: bold; }
        </style>

        <http-request method="GET" slice="cem-stroke" url="../../../dist/lib/tokens/cem-stroke.xhtml"></http-request>
        <variable name="strokeData" select="//cem-stroke"></variable>

        <variable name="cem-stroke-basis"
                  select="$strokeData//*[@id='cem-stroke-basis']/following-sibling::xhtml:table[1]/xhtml:tbody"></variable>
        <variable name="cem-stroke-semantic"
                  select="$strokeData//*[@id='cem-stroke-semantic']/following-sibling::xhtml:table[1]/xhtml:tbody"></variable>
        <variable name="cem-stroke-zebra-pattern"
                  select="$strokeData//*[@id='cem-stroke-zebra-pattern']/following-sibling::xhtml:table[1]/xhtml:tbody"></variable>
        <variable name="cem-stroke-rings"
                  select="$strokeData//*[@id='cem-stroke-rings']/following-sibling::xhtml:table[1]/xhtml:tbody"></variable>
        <variable name="cem-stroke-rings-forced"
                  select="$strokeData//*[@id='cem-stroke-rings-forced']/following-sibling::xhtml:table[1]/xhtml:tbody"></variable>

        <variable name="css-body">
:root {
    /* region stroke basis — none / hair / standard / strong */
    <for-each select="$cem-stroke-basis/xhtml:tr">
        {normalize-space(xhtml:td[1])}: {normalize-space(xhtml:td[2])};
    </for-each>
    /* endregion stroke basis */

    /* region semantic endpoints — boundary / divider / focus / selected / target / indicator-offset */
    <for-each select="$cem-stroke-semantic/xhtml:tr">
        {normalize-space(xhtml:td[1])}: {normalize-space(xhtml:td[2])};
    </for-each>
    /* endregion semantic endpoints */

    /* region zebra pattern geometry — angle only (strip-size and colors owned by D0) */
    <for-each select="$cem-stroke-zebra-pattern/xhtml:tr">
        {normalize-space(xhtml:td[1])}: {normalize-space(xhtml:td[2])};
    </for-each>
    /* endregion zebra pattern geometry */

    /* region ring recipes — box-shadow composition referencing D0 zebra tokens */
    <for-each select="$cem-stroke-rings/xhtml:tr">
        {normalize-space(xhtml:td[1])}: {normalize-space(xhtml:td[2])};
    </for-each>
    /* endregion ring recipes */
}

/* region forced-colors fallback — collapse rings to a single Highlight outline (Principle P4) */
@media (forced-colors: active) {
    :root {
        <for-each select="$cem-stroke-rings-forced/xhtml:tr">
            {normalize-space(xhtml:td[1])}: {normalize-space(xhtml:td[2])};
        </for-each>
    }
}
/* endregion forced-colors fallback */
        </variable>

        <style>
            :host {
                display: block;
                white-space: pre;
                font-family: monospace;
            }
        </style>

        <xhtml:table>
            <xhtml:caption><a href="../../../dist/lib/tokens/cem-stroke.xhtml#3-1-stroke-basis-tokens">cem-stroke-basis</a> — stroke basis</xhtml:caption>
            <xhtml:thead>
                <xhtml:tr>
                    <xhtml:th>Token</xhtml:th>
                    <xhtml:th>Value</xhtml:th>
                    <xhtml:th>Tier</xhtml:th>
                    <xhtml:th>Sample</xhtml:th>
                    <xhtml:th>Description</xhtml:th>
                </xhtml:tr>
            </xhtml:thead>
            <xhtml:tbody>
                <for-each select="$cem-stroke-basis/xhtml:tr">
                    <variable name="token" select="normalize-space(xhtml:td[1])"></variable>
                    <variable name="value" select="normalize-space(xhtml:td[2])"></variable>
                    <variable name="desc"  select="normalize-space(xhtml:td[3])"></variable>
                    <variable name="tier"  select="normalize-space(xhtml:td[4])"></variable>
                    <xhtml:tr>
                        <xhtml:th><code>{$token}</code></xhtml:th>
                        <xhtml:td><code>{$value}</code></xhtml:td>
                        <xhtml:td>{$tier}</xhtml:td>
                        <xhtml:td style="width:6rem;">
                            <xhtml:div style="height:1.25rem; width:5rem; border-block-end: var({$token}) solid currentColor;" title="{$token}"></xhtml:div>
                        </xhtml:td>
                        <xhtml:td>{$desc}</xhtml:td>
                    </xhtml:tr>
                </for-each>
            </xhtml:tbody>
        </xhtml:table>

        <hr/>
        <xhtml:table>
            <xhtml:caption><a href="../../../dist/lib/tokens/cem-stroke.xhtml#4-1-endpoints">cem-stroke-semantic</a> — semantic stroke endpoints</xhtml:caption>
            <xhtml:thead>
                <xhtml:tr>
                    <xhtml:th>Token</xhtml:th>
                    <xhtml:th>Value</xhtml:th>
                    <xhtml:th>Tier</xhtml:th>
                    <xhtml:th>Sample</xhtml:th>
                    <xhtml:th>Description</xhtml:th>
                </xhtml:tr>
            </xhtml:thead>
            <xhtml:tbody>
                <for-each select="$cem-stroke-semantic/xhtml:tr">
                    <variable name="token" select="normalize-space(xhtml:td[1])"></variable>
                    <variable name="value" select="normalize-space(xhtml:td[2])"></variable>
                    <variable name="desc"  select="normalize-space(xhtml:td[3])"></variable>
                    <variable name="tier"  select="normalize-space(xhtml:td[4])"></variable>
                    <xhtml:tr>
                        <xhtml:th><code>{$token}</code></xhtml:th>
                        <xhtml:td><code>{$value}</code></xhtml:td>
                        <xhtml:td>{$tier}</xhtml:td>
                        <xhtml:td style="width:6rem;">
                            <xhtml:div style="height:1.25rem; width:5rem; border-block-end: var({$token}) solid currentColor;" title="{$token}"></xhtml:div>
                        </xhtml:td>
                        <xhtml:td>{$desc}</xhtml:td>
                    </xhtml:tr>
                </for-each>
            </xhtml:tbody>
        </xhtml:table>

        <hr/>
        <xhtml:table>
            <xhtml:caption><a href="../../../dist/lib/tokens/cem-stroke.xhtml#5-2-canonical-zebra-tokens-d5-contract">cem-stroke-zebra-pattern</a> + <a href="../../../dist/lib/tokens/cem-stroke.xhtml#5-3-recommended-indicator-composition-box-shadow-ring">cem-stroke-rings</a> — zebra-pattern geometry and ring recipes</xhtml:caption>
            <xhtml:thead>
                <xhtml:tr>
                    <xhtml:th>Token</xhtml:th>
                    <xhtml:th>Value</xhtml:th>
                    <xhtml:th>Tier</xhtml:th>
                    <xhtml:th>Description</xhtml:th>
                </xhtml:tr>
            </xhtml:thead>
            <xhtml:tbody>
                <for-each select="$cem-stroke-zebra-pattern/xhtml:tr | $cem-stroke-rings/xhtml:tr">
                    <variable name="token" select="normalize-space(xhtml:td[1])"></variable>
                    <variable name="value" select="normalize-space(xhtml:td[2])"></variable>
                    <variable name="desc"  select="normalize-space(xhtml:td[3])"></variable>
                    <variable name="tier"  select="normalize-space(xhtml:td[4])"></variable>
                    <xhtml:tr>
                        <xhtml:th><code>{$token}</code></xhtml:th>
                        <xhtml:td><code>{$value}</code></xhtml:td>
                        <xhtml:td>{$tier}</xhtml:td>
                        <xhtml:td>{$desc}</xhtml:td>
                    </xhtml:tr>
                </for-each>
            </xhtml:tbody>
        </xhtml:table>

        <hr/>
        <xhtml:table>
            <xhtml:caption><a href="../../../dist/lib/tokens/cem-stroke.xhtml#8-2-forced-colors-high-contrast">cem-stroke-rings-forced</a> — forced-colors fallback</xhtml:caption>
            <xhtml:thead>
                <xhtml:tr>
                    <xhtml:th>Token</xhtml:th>
                    <xhtml:th>Forced-colors value</xhtml:th>
                </xhtml:tr>
            </xhtml:thead>
            <xhtml:tbody>
                <for-each select="$cem-stroke-rings-forced/xhtml:tr">
                    <variable name="token" select="normalize-space(xhtml:td[1])"></variable>
                    <variable name="value" select="normalize-space(xhtml:td[2])"></variable>
                    <xhtml:tr>
                        <xhtml:th><code>{$token}</code></xhtml:th>
                        <xhtml:td><code>{$value}</code></xhtml:td>
                    </xhtml:tr>
                </for-each>
            </xhtml:tbody>
        </xhtml:table>

        <hr/>
        <pre class="language-css">
            <code class="language-css" data-generated-css>
{$css-body}
            </code>
        </pre>
        <cem-css-loader value="{$css-body}"></cem-css-loader>

    </template>
</custom-element>
<main></main>
<script src="../../../../../node_modules/@epa-wg/custom-element/custom-element.js" type="module"></script>
<script src="../../../../../node_modules/@epa-wg/custom-element/http-request.js" type="module"></script>
<script src="./cem-css-loader.js" type="module"></script>
</body>
</html>
