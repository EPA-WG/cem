<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CEM colors CSS generator</title>
    <style>
        main { display: block; white-space: pre; font-family: monospace; }
        table { white-space: normal; border-collapse: collapse; }
        td { padding: 0.5rem; letter-spacing: 0.05em; }
        caption { font-size: 1.5rem; padding-bottom: 0.5rem; text-align: start; }
        tr>th:first-child { text-align: start; }
        code { color: green; font-weight: bold; }
    </style>
</head>
<body>
<!--
  Phase 3.6 CEM-ML/CEM-QL generator (Option B). cem-css-generator.js shapes the token tables into
  datadom.slices via the cem-elements DOM→datadom bridge and renders this template through the
  cem_ql WASM boundary; no live browser XSLT. The full color logic runs in cem-ql:
   - hue-variant: td1=token td4=value.
   - emotion-shift: td1=token td3=Light td4=dark td5=NativeLight td6=NativeDark. The cem-theme
     palette resolves each short name to var(--cem-color-<name>) when that token exists in the
     hue-variant table (cross-table join: datadom.slices.hue.td1 = str:concat(("--cem-color-",name)))
     else var(--cem-palette-<name>); native uses td5/td6 format heuristics.
   - action cross-product: intent (td1=intent td2=emotion) × state (td1=state td2=bg td3=text);
     the [emotion] placeholder is filled with str:replace.
   - zebra-mode-mapping: td1=mode td3=focus td4=target td5=selected; var()-wrapped when the value
     starts with `--`, else used raw (system colors).
  @test uses bare cem-ql names + double-quoted string literals (so attributes are single-quoted).
-->
<template type="cem-ml; version=0.0"
          id="cem-colors-template"
          data-token-url="../../../dist/lib/tokens/cem-colors.xhtml"
          data-slices="hue=cem-color-hue-variant shift=cem-palette-emotion-shift intent=cem-action-intent-emotion state=cem-action-state-color zmap=cem-zebra-mode-mapping">
{table |
    {caption | {a @href="../../../dist/lib/tokens/cem-colors.xhtml#cem-color-hue-variant" | cem-color-hue-variant} — branded color ramp}
    {thead | {tr | {th | Token}{th | Value}{th | Tier}}}
    {tbody | {cem:for-each @select="$datadom.slices.hue" @as="row" |
        {tr | {th | {code | {$row.td1}}}{td | {code | {$row.td4}}}{td | {$row.td7}}}}}
}
{hr | }
{table |
    {caption | {a @href="../../../dist/lib/tokens/cem-colors.xhtml#cem-palette-emotion-shift" | cem-palette-emotion-shift} — emotional palette}
    {thead | {tr | {th | Token}{th | Role}{th | Light}{th | dark}{th | Tier}}}
    {tbody | {cem:for-each @select="$datadom.slices.shift" @as="row" |
        {tr | {th | {code | {$row.td1}}}{td | {$row.td2}}{td | {code | {$row.td3}}}{td | {code | {$row.td4}}}{td | {$row.td10}}}}}
}
{hr | }
{table |
    {caption | {a @href="../../../dist/lib/tokens/cem-colors.xhtml#cem-action-intent-emotion" | cem-action-intent-emotion} × {a @href="../../../dist/lib/tokens/cem-colors.xhtml#cem-action-state-color" | cem-action-state-color} — action tokens}
    {thead | {tr | {th | Intent}{th | Emotion}{th | States}}}
    {tbody | {cem:for-each @select="$datadom.slices.intent" @as="row" |
        {tr | {th | {code | {$row.td1}}}{td | {$row.td2}}{td | {cem:for-each @select="$datadom.slices.state" @as="st" |{code | {$st.td1}} }}}}}
}
{hr | }
{pre @class=language-css | {code @class=language-css @data-generated-css |```:root {
  /* region branded colors: cem-color-[hue]-[variant] */```{cem:for-each @select="$datadom.slices.hue" @as="row" |```
  ```{$row.td1}: {$row.td4};}```
  /* endregion branded colors */

  /* region emotion palette: cem-palette-[emotion]-[shift] (light/dark) */```{cem:for-each @select="$datadom.slices.shift" @as="emo" |```
  ```{$emo.td1}: {cem:choose |{cem:when @test='emo.td4 != ""' |light-dark({cem:choose |{cem:when @test='datadom.slices.hue.td1 & (str:concat(("--cem-color-", emo.td3)))' |var(--cem-color-{$emo.td3})}{cem:otherwise |var(--cem-palette-{$emo.td3})}}, {cem:choose |{cem:when @test='datadom.slices.hue.td1 & (str:concat(("--cem-color-", emo.td4)))' |var(--cem-color-{$emo.td4})}{cem:otherwise |var(--cem-palette-{$emo.td4})}})}{cem:otherwise |{cem:choose |{cem:when @test='datadom.slices.hue.td1 & (str:concat(("--cem-color-", emo.td3)))' |var(--cem-color-{$emo.td3})}{cem:otherwise |var(--cem-palette-{$emo.td3})}}}};}```
  /* endregion emotion palette */

  /* region zebra base: anchor all stripes to surface (§8.2) */
  --cem-zebra-color-0: var(--cem-palette-comfort);
  --cem-zebra-color-1: var(--cem-palette-comfort);
  --cem-zebra-color-2: var(--cem-palette-comfort);
  --cem-zebra-color-3: var(--cem-palette-comfort);
  --cem-zebra-strip-size: 2px;
  /* endregion zebra base */

  /* region common for cem themes */
  [data-theme*="cem-theme-"], .cem-theme-native, .cem-theme-contrast-light, .cem-theme-contrast-dark, .cem-theme-light, .cem-theme-dark {
    /* action intent tokens: cem-action-[intent]-[state]-[background|text] */```{cem:for-each @select="$datadom.slices.intent" @as="intent" |{cem:for-each @select="$datadom.slices.state" @as="state" |```
    ```--cem-action-{$intent.td1}-{$state.td1}-background: {$str:replace(state.td2, "[emotion]", intent.td2)};
    --cem-action-{$intent.td1}-{$state.td1}-text: {$str:replace(state.td3, "[emotion]", intent.td2)};}}```
    --cem-zebra-color-0: var(--cem-palette-comfort);
    --cem-zebra-color-1: var(--cem-palette-comfort);
    --cem-zebra-color-2: var(--cem-palette-comfort);
    --cem-zebra-color-3: var(--cem-palette-comfort);
    background-color: var(--cem-palette-comfort);
    color: var(--cem-palette-comfort-text);
  }
  /* endregion common for cem themes */

  .cem-theme-light, [data-theme="cem-theme-light"], .cem-theme-contrast-light, [data-theme="cem-theme-contrast-light"] { color-scheme: light; }
  .cem-theme-dark, [data-theme="cem-theme-dark"], .cem-theme-contrast-dark, [data-theme="cem-theme-contrast-dark"] { color-scheme: dark; }

  /* region zebra state per theme mode (§8.2 cem-zebra-mode-mapping) */```{cem:for-each @select="$datadom.slices.zmap" @as="z" |```
  .cem-theme-```{$z.td1}```, [data-theme="cem-theme-```{$z.td1}```"] {
    [focus], :focus, :focus-visible, :focus-within, .focus { --cem-zebra-color-1: ```{cem:choose |{cem:when @test='str:starts_with(z.td3, "--")' |var({$z.td3})}{cem:otherwise |{$z.td3}}}```; }
    [target], :target, .target { --cem-zebra-color-2: ```{cem:choose |{cem:when @test='str:starts_with(z.td4, "--")' |var({$z.td4})}{cem:otherwise |{$z.td4}}}```; }
    [selected], .selected { --cem-zebra-color-3: ```{cem:choose |{cem:when @test='str:starts_with(z.td5, "--")' |var({$z.td5})}{cem:otherwise |{$z.td5}}}```; }
  }```}```
  /* endregion zebra state */

  /* region native theme overrides */
  .cem-theme-native, [data-theme="cem-theme-native"] {```{cem:for-each @select="$datadom.slices.shift" @as="emo" |```
    ```{$emo.td1}: {cem:choose |{cem:when @test='emo.td6 != ""' |light-dark({cem:choose |{cem:when @test='str:starts_with(emo.td5, "--")' |var({$emo.td5})}{cem:when @test='str:contains(emo.td5, "-") and not(str:contains(emo.td5, "("))' |var(--cem-color-{$emo.td5})}{cem:otherwise |{$emo.td5}}}, {cem:choose |{cem:when @test='str:starts_with(emo.td6, "--")' |var({$emo.td6})}{cem:when @test='str:contains(emo.td6, "-") and not(str:contains(emo.td6, "("))' |var(--cem-color-{$emo.td6})}{cem:otherwise |{$emo.td6}}})}{cem:otherwise |{$emo.td5}}};}```
    [focus], :focus, :focus-visible, :focus-within, .focus { --cem-zebra-color-1: CanvasText; }
    [target], :target, .target { --cem-zebra-color-2: Mark; }
    [selected], .selected { --cem-zebra-color-3: SelectedItem; }
  }
  /* endregion native */

  background-color: var(--cem-palette-comfort);
  color: var(--cem-palette-comfort-text);
}
```}}
</template>
<main></main>
<cem-css-loader></cem-css-loader>
<script src="./cem-css-loader.js" type="module"></script>
<script src="./cem-css-generator.js" type="module"></script>
</body>
</html>
