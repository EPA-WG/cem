[package]
name = "cem-ml-cli"
version = "0.1.0"
edition = "2021"
description = "CEM parser/runtime CLI"
license = "MIT"
publish = true

[[bin]]
name = "cem-ml"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
cem-ml = { path = "../cem_ml" }
serde_json = "1"

[dev-dependencies]
cem-ml = { path = "../cem_ml", features = ["fake-engine"] }
