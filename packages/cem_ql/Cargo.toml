[package]
name = "cem-ql"
version = "0.1.0"
edition = "2021"
description = "CEM query language compiler and evaluator"
license = "MIT"
publish = true

[lib]
name = "cem_ql"
crate-type = ["cdylib", "rlib"]

[dependencies]
cem-ml = { path = "../cem_ml" }
serde_json = "1"

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
