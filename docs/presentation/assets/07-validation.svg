<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7.5" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1200" height="300" fill="#f8fafc"/>
  <rect x="0.5" y="0.5" width="1199" height="299" fill="none" stroke="#e2e8f0"/>
  <rect x="28" y="26" width="32" height="25" rx="5" fill="#2563eb"/>
  <text x="44" y="44" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">07</text>
  <text x="70" y="45" font-size="19" font-weight="700" fill="#0f172a">Validation &amp; Strict Typing</text>
  <text x="350" y="45" font-size="13" fill="#64748b">— forgiving within a major, strict across one</text>

  <!-- inputs -->
  <rect x="48" y="92" width="150" height="56" rx="9" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="123" y="119" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">Document</text>
  <text x="123" y="137" font-size="10.5" fill="#64748b" text-anchor="middle">declares schema X.Y</text>
  <rect x="48" y="172" width="150" height="56" rx="9" fill="#ede9fe" stroke="#ddd6fe"/>
  <text x="123" y="199" font-size="13" font-weight="700" fill="#4c1d95" text-anchor="middle">Schema</text>
  <text x="123" y="217" font-size="10.5" fill="#6d28d9" text-anchor="middle">loaded version X.Y'</text>

  <!-- validator -->
  <rect x="246" y="110" width="168" height="100" rx="10" fill="#1e3a5f"/>
  <text x="330" y="150" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Validator</text>
  <text x="330" y="171" font-size="11" fill="#94a3b8" text-anchor="middle">compares embedded</text>
  <text x="330" y="186" font-size="11" fill="#94a3b8" text-anchor="middle">SemVer of X.Y vs X.Y'</text>

  <line x1="198" y1="120" x2="240" y2="135" stroke="#475569" stroke-width="2.5" marker-end="url(#ar)"/>
  <line x1="198" y1="200" x2="240" y2="185" stroke="#475569" stroke-width="2.5" marker-end="url(#ar)"/>

  <!-- forgiving lane -->
  <path d="M414 140 C 446 140, 446 120, 478 120" fill="none" stroke="#475569" stroke-width="2.5" marker-end="url(#ar)"/>
  <rect x="488" y="88" width="664" height="64" rx="9" fill="#dcfce7"/>
  <rect x="488" y="88" width="5" height="64" fill="#16a34a"/>
  <text x="510" y="114" font-size="13.5" font-weight="700" fill="#14532d">Forgiving — same major, equal/newer minor</text>
  <text x="510" y="136" font-size="12" fill="#3f6212">Unknown elements / attributes become warnings · code cem.v.minor_skew</text>

  <!-- strict lane -->
  <path d="M414 180 C 446 180, 446 200, 478 200" fill="none" stroke="#475569" stroke-width="2.5" marker-end="url(#ar)"/>
  <rect x="488" y="168" width="664" height="64" rx="9" fill="#fee2e2"/>
  <rect x="488" y="168" width="5" height="64" fill="#dc2626"/>
  <text x="510" y="194" font-size="13.5" font-weight="700" fill="#7f1d1d">Strict — major mismatch (or any 0.x skew)</text>
  <text x="510" y="216" font-size="12" fill="#9a3412">Validation fails loudly and aborts the scope · code cem.v.major_mismatch</text>

  <text x="600" y="270" font-size="11.5" fill="#94a3b8" text-anchor="middle" font-style="italic">One diagnostic identity and source-map stack across parser, schema, AST, report, and transform layers.</text>
</svg>
