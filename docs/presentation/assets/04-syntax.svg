<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <rect width="1200" height="300" fill="#f8fafc"/>
  <rect x="0.5" y="0.5" width="1199" height="299" fill="none" stroke="#e2e8f0"/>
  <rect x="28" y="26" width="32" height="25" rx="5" fill="#2563eb"/>
  <text x="44" y="44" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">04</text>
  <text x="70" y="45" font-size="19" font-weight="700" fill="#0f172a">CEM-ML Syntax</text>
  <text x="240" y="45" font-size="13" fill="#64748b">— curly-brace surface: structure, attributes, content</text>

  <!-- code sample, color-coded by plane; textLength pins glyph advance -->
  <text x="303" y="160" font-family="'Courier New',ui-monospace,monospace" font-size="26" font-weight="700" textLength="593" lengthAdjust="spacing">
    <tspan fill="#2563eb">{badge</tspan><tspan fill="#7c3aed"> @tone="info"</tspan><tspan fill="#0d9488"> | Secure checkout</tspan><tspan fill="#2563eb">}</tspan>
  </text>

  <!-- connector ticks -->
  <line x1="350" y1="178" x2="350" y2="200" stroke="#2563eb" stroke-width="2"/>
  <line x1="498" y1="178" x2="498" y2="200" stroke="#7c3aed" stroke-width="2"/>
  <line x1="740" y1="178" x2="740" y2="200" stroke="#0d9488" stroke-width="2"/>

  <!-- plane labels -->
  <text x="350" y="218" font-size="13" font-weight="700" fill="#2563eb" text-anchor="middle">STRUCTURE  { }</text>
  <text x="350" y="236" font-size="11" fill="#64748b" text-anchor="middle">node + name</text>
  <text x="498" y="218" font-size="13" font-weight="700" fill="#7c3aed" text-anchor="middle">ATTRIBUTES  @</text>
  <text x="498" y="236" font-size="11" fill="#64748b" text-anchor="middle">typed metadata</text>
  <text x="740" y="218" font-size="13" font-weight="700" fill="#0d9488" text-anchor="middle">CONTENT  |</text>
  <text x="740" y="236" font-size="11" fill="#64748b" text-anchor="middle">character / child content</text>

  <line x1="60" y1="262" x2="1140" y2="262" stroke="#e2e8f0" stroke-width="1"/>
  <text x="600" y="282" font-size="12" fill="#94a3b8" text-anchor="middle" font-style="italic">Also: namespaced nodes (html:aside) · typed { @type | ... } scopes · ASCII and Unicode delimiter profiles · XML is a secondary parity surface.</text>
</svg>
